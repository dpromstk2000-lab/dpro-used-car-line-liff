<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#10243e">
  <meta name="description" content="DPRO中古車センターの管理者用公開前プレビュー。">
  <title>公開前プレビュー｜DPRO中古車センター</title>
  <style>
    :root{--navy:#10243e;--navy2:#173858;--ink:#122033;--muted:#5d6c7d;--amber:#e5a12b;--amber2:#fff1d2;--canvas:#f4f2ed;--paper:#fff;--soft:#eef2f5;--line:#d5dee5;--green:#117b61;--green2:#e5f5ef;--red:#b44235;--red2:#fff0ed;--shadow:0 14px 34px rgba(9,21,34,.10);--tap:52px}
    *{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;background:var(--canvas);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:17px;line-height:1.68}button,input,a{font:inherit}:focus-visible{outline:4px solid rgba(229,161,43,.42);outline-offset:2px}
    .topbar{background:#091522;color:#fff}.topbar-inner{width:min(1120px,calc(100% - 32px));min-height:70px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:16px}.topbar a{color:#fff;text-decoration:none;font-weight:900}.preview-badge{padding:6px 11px;border-radius:999px;background:var(--amber);color:#14263a;font-size:13px;font-weight:900}
    .gate-wrap{min-height:calc(100vh - 70px);padding:50px 16px;background:linear-gradient(135deg,#091522,var(--navy2));display:grid;place-items:start center}.gate{width:min(620px,100%);overflow:hidden;border-radius:22px;background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.28)}.gate-head{padding:30px;background:var(--navy);color:#fff}.gate-head h1{margin:0;font-size:32px}.gate-head p{margin:6px 0 0;color:#d9e4ed}.gate-body{padding:28px}.code-row{display:grid;grid-template-columns:1fr auto;gap:9px}.code-row input{min-height:var(--tap);padding:10px 13px;border:2px solid #c8d2da;border-radius:12px}.button{min-height:var(--tap);padding:9px 18px;border:1px solid #c4cfd8;border-radius:12px;background:#fff;color:var(--navy);font-weight:900;cursor:pointer}.button.primary{border-color:var(--amber);background:var(--amber);color:#14263a}.note{margin:13px 0 0;color:var(--muted);font-size:14px}.error{margin-top:14px;padding:12px;border-radius:11px;background:var(--red2);color:#8f1d14;font-weight:800}
    .page{width:min(1120px,calc(100% - 32px));margin:28px auto 70px}.readiness{margin-bottom:18px;padding:18px 20px;border:1px solid var(--line);border-radius:17px;background:#fff;box-shadow:var(--shadow)}.readiness.ready{border-color:#97d0bd;background:var(--green2)}.readiness h2{margin:0;font-size:22px}.readiness p{margin:5px 0 0}.missing{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}.missing span{padding:4px 9px;border-radius:999px;background:#fff4df;color:#76520f;font-size:13px;font-weight:800}
    .panel{overflow:hidden;display:grid;grid-template-columns:1.08fr .92fr;border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:var(--shadow)}.gallery{padding:22px;background:linear-gradient(145deg,#eef4f7,#e9e6df)}.main{height:390px;display:grid;place-items:center;overflow:hidden;border-radius:18px;background:#e7edf1;color:#466078}.main img{width:100%;height:100%;object-fit:cover}.main svg{width:72%;max-width:380px}.thumbs{display:flex;gap:8px;margin-top:12px;overflow-x:auto}.thumb{width:82px;height:61px;flex:0 0 auto;padding:0;border:3px solid transparent;border-radius:10px;overflow:hidden;background:#dce4e9;cursor:pointer}.thumb.active{border-color:var(--amber)}.thumb img{width:100%;height:100%;object-fit:cover}.body{padding:28px}.status{display:flex;justify-content:space-between;gap:10px}.status span:first-child{padding:5px 10px;border-radius:999px;background:var(--navy);color:#fff;font-size:12px;font-weight:900}.status span:last-child{color:var(--muted);font-size:13px}.body h2{margin:12px 0 7px;font-size:31px}.description{color:var(--muted);white-space:pre-wrap}.price{margin:22px 0;padding:18px;border-radius:15px;background:var(--amber2)}.price small{display:block}.price strong{display:block;font-size:32px;color:var(--navy)}.specs{display:grid;grid-template-columns:1fr 1fr;gap:10px}.spec{padding:10px 12px;border-radius:10px;background:var(--soft)}.spec small{display:block;color:var(--muted)}.features{display:flex;flex-wrap:wrap;gap:7px;margin-top:17px}.features span{padding:5px 9px;border-radius:7px;background:#edf2f5;font-size:13px}.safe{margin-top:18px;padding:18px;border-radius:17px;background:var(--navy);color:#fff}.safe p{margin:5px 0 0;color:#cfdae4}
    @media(max-width:820px){.panel{grid-template-columns:1fr}.main{height:290px}}@media(max-width:620px){body{font-size:17px}.topbar-inner,.page{width:min(100% - 20px,1120px)}.body{padding:21px 17px}.body h2{font-size:25px}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><a id="ownerLink" href="owner.html">← オーナー管理画面</a><span class="preview-badge">管理者用プレビュー</span></div></header>
  <main class="gate-wrap" id="gate"><section class="gate"><div class="gate-head"><h1>公開前プレビュー</h1><p>お客様へ見える内容だけを、安全に確認します。</p></div><div class="gate-body"><form id="loginForm"><label for="adminCode"><strong>管理コード</strong></label><div class="code-row"><input id="adminCode" type="password" inputmode="numeric" autocomplete="off" maxlength="32"><button class="button primary" type="submit">プレビューを開く</button></div><p class="note">管理コードは端末へ保存しません。登録番号・車台番号・仕入原価はAPIから返しません。</p><div class="error" id="error" hidden></div></form></div></section></main>
  <main class="page" id="page" hidden>
    <section class="readiness" id="readiness"><h2 id="readinessTitle"></h2><p id="readinessText"></p><div class="missing" id="missing"></div></section>
    <section class="panel"><div class="gallery"><div class="main" id="mainPhoto"></div><div class="thumbs" id="thumbs"></div></div><div class="body"><div class="status"><span id="statusLabel">公開前</span><span id="inventoryCode"></span></div><h2 id="title"></h2><p class="description" id="description"></p><div class="price"><small>支払総額</small><strong id="totalPrice"></strong><div id="breakdown"></div></div><div class="specs" id="specs"></div><div class="features" id="features"></div></div></section>
    <section class="safe"><h2>プレビューの安全設計</h2><p>この画面は管理者認証後だけ表示し、個人情報・登録番号・車台番号・仕入原価・査定写真を含みません。</p></section>
  </main>
  <script src="config.js"></script>
  <script>
  (()=>{"use strict";
    const config=window.DPRO_CAR_CONFIG||{},params=new URLSearchParams(location.search),id=params.get("id")||"",demo=params.get("demo")==="1",byId=x=>document.getElementById(x),money=v=>new Intl.NumberFormat("ja-JP").format(Number(v||0));
    byId("ownerLink").href=`owner.html${demo?"?demo=1":""}`;if(demo)byId("adminCode").value="1234";
    const carSvg=()=>'<svg viewBox="0 0 560 270" fill="none" aria-hidden="true"><path d="M89 184c8-29 24-52 47-67l62-40c18-12 39-18 61-18h70c32 0 61 14 81 39l42 51 48 16c15 5 25 19 25 35v11H44v-5c0-12 8-22 19-25l26-7Z" fill="currentColor"/><circle cx="150" cy="208" r="39" fill="#131B25"/><circle cx="422" cy="208" r="39" fill="#131B25"/></svg>';
    function text(id,value){byId(id).textContent=value??""}function spec(label,value){const n=document.createElement("div");n.className="spec";const s=document.createElement("small");s.textContent=label;const b=document.createElement("b");b.textContent=value||"―";n.append(s,b);return n}
    function gallery(vehicle){const main=byId("mainPhoto"),thumbs=byId("thumbs"),photos=vehicle.photos||[];main.replaceChildren();thumbs.replaceChildren();if(!photos.length){main.innerHTML=carSvg();return}const show=(photo,button)=>{main.replaceChildren();const img=document.createElement("img");img.src=photo.url;img.alt=photo.alt_text||`${vehicle.manufacturer} ${vehicle.car_name}`;main.append(img);thumbs.querySelectorAll(".thumb").forEach(x=>x.classList.remove("active"));button.classList.add("active")};photos.forEach((photo,index)=>{const b=document.createElement("button");b.type="button";b.className=`thumb${index===0?" active":""}`;const img=document.createElement("img");img.src=photo.url;img.alt=photo.alt_text||`車両写真${index+1}`;b.append(img);b.addEventListener("click",()=>show(photo,b));thumbs.append(b)});show(photos[0],thumbs.firstElementChild)}
    function render(data){const v=data.vehicle,r=data.publish_readiness||{};byId("gate").hidden=true;byId("page").hidden=false;byId("readiness").classList.toggle("ready",r.ready===true);text("readinessTitle",r.ready?"公開準備が整っています":"公開前に確認が必要です");text("readinessText",r.ready?"この内容で公開できます。":"不足項目を入力・更新してから公開してください。");const m=byId("missing");m.replaceChildren();(r.missing||[]).forEach(value=>{const s=document.createElement("span");s.textContent=value;m.append(s)});text("statusLabel",r.ready?"公開可能":"公開前プレビュー");text("inventoryCode",v.inventory_code);text("title",v.public_title||`${v.manufacturer} ${v.car_name} ${v.grade||""}`.trim());text("description",v.public_description||"公開説明が未入力です。");text("totalPrice",`${money(v.total_price)}円`);text("breakdown",`車両価格 ${money(v.vehicle_price)}円／諸費用 ${money(v.extra_cost)}円`);const specs=byId("specs");specs.replaceChildren(spec("年式",v.model_year?`${v.model_year}年`:"―"),spec("走行距離",`${money(v.mileage_km)}km`),spec("ボディタイプ",v.body_type),spec("燃料",v.fuel_type),spec("駆動方式",v.drive_type),spec("車検期限",v.inspection_expiry||"店舗確認"),spec("修復歴",v.repair_history==="none"?"なし":v.repair_history==="yes"?"あり":"店舗確認"),spec("カラー",v.color));const f=byId("features");f.replaceChildren();(v.feature_tags||[]).forEach(value=>{const s=document.createElement("span");s.textContent=value;f.append(s)});gallery(v)}
    async function load(){if(!/^[0-9a-f-]{36}$/i.test(id))throw new Error("在庫IDが正しくありません。");const key=byId("adminCode").value.trim();if(!key)throw new Error("管理コードを入力してください。");const response=await fetch(`${config.apiBase}/api/admin/inventory/${encodeURIComponent(id)}/public-preview`,{headers:{Accept:"application/json","X-Admin-Key":key},cache:"no-store"}),data=await response.json();if(!response.ok||!data.ok)throw new Error(data?.error?.message||"プレビューを取得できませんでした。");render(data)}
    byId("loginForm").addEventListener("submit",async e=>{e.preventDefault();byId("error").hidden=true;try{await load()}catch(error){text("error",error.message);byId("error").hidden=false}});
    if(demo)setTimeout(()=>byId("loginForm").requestSubmit(),120);
  })();
  </script>
</body>
</html>
