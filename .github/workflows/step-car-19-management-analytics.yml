name: DPRO CAR STEP CAR-19 Management Analytics

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-19-management-analytics.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-19
  cancel-in-progress: false

jobs:
  update-management-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-19 Worker and SQL
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          url = "https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/json",
                  "User-Agent": "Mozilla/5.0 Chrome/150.0 Safari/537.36",
                  "Origin": "https://dpromstk2000-lab.github.io",
                  "Referer": "https://dpromstk2000-lab.github.io/dpro-used-car-line-liff/",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=25) as response:
                  data = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 403:
                  print("::warning::GitHub ActionsからWorker確認がHTTP 403になりました。ブラウザ確認済みとしてフロント更新を続行します。")
                  raise SystemExit(0)
              raise

          expected = "CAR-19-WORKER-MANAGEMENT-ANALYTICS-COMPLETE-20260723"
          if data.get("version") != expected:
              raise SystemExit(f"WorkerがCAR-19ではありません: {data.get('version')}")
          checks = data.get("checks") or {}
          required = [
              "car19_management_dashboard_schema",
              "owner_management_dashboard_api_ready",
              "owner_management_targets_api_ready",
              "management_gross_profit_internal_guard_ready",
              "management_inventory_aging_ready",
              "management_conversion_metrics_ready",
          ]
          failed = [key for key in required if checks.get(key) is not True]
          if failed:
              raise SystemExit(f"CAR-19 Worker/SQL確認失敗: {failed}")
          print("CAR-19 Worker/SQL: OK")
          PY

      - name: Apply CAR-19 frontend update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          OWNER=Path("owner.html")
          CONFIG=Path("config.js")
          SYSTEM=Path("system-check.html")
          OLD_VERSION="CAR-18-AFTERCARE-MAINTENANCE-RETENTION-20260723"
          VERSION="CAR-19-MANAGEMENT-ANALYTICS-20260723"
          for path in (OWNER,CONFIG,SYSTEM):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")
          owner=OWNER.read_text(encoding="utf-8")
          if OLD_VERSION not in owner:
              raise SystemExit("CAR-18 owner.htmlを確認できません。")
          css=base64.b64decode("").decode("utf-8")
          owner_js=base64.b64decode("").decode("utf-8")
          if "DPRO CAR STEP CAR-19 MANAGEMENT ANALYTICS" not in owner:
              owner=owner.replace("  </style>",css+"\n  </style>",1)
          section_marker='        <section class="section-view" id="view-aftercare" hidden></section>'
          if 'id="view-management"' not in owner:
              if owner.count(section_marker)!=1:
                  raise SystemExit("経営分析画面の挿入位置を確認できません。")
              owner=owner.replace(section_marker,section_marker+'\n        <section class="section-view" id="view-management" hidden></section>',1)
          old_section='      {id:"aftercare",icon:"巡",label:"納車後管理",kicker:"AFTERCARE & RETENTION",title:"点検・車検・乗り換え",description:"納車後フォロー、点検、車検、保証、整備履歴、乗り換え見込みを管理します。",count:d=>(d.followups||[]).filter(x=>["pending","prepared"].includes(x.status)).length},'
          new_section=old_section+'\n      {id:"management",icon:"経",label:"経営分析",kicker:"MANAGEMENT ANALYTICS",title:"経営・在庫・粗利",description:"査定、買取、販売、在庫回転、粗利、成約率を経営数値で確認します。",count:()=>0},'
          if 'id:"management"' not in owner:
              if owner.count(old_section)!=1:
                  raise SystemExit("経営分析メニューの挿入位置を確認できません。")
              owner=owner.replace(old_section,new_section,1)
          old_render='delivery:renderDelivery,aftercare:renderAftercare,team:renderTeam'
          new_render='delivery:renderDelivery,aftercare:renderAftercare,management:renderManagement,team:renderTeam'
          if 'management:renderManagement' not in owner:
              if owner.count(old_render)!=1:
                  raise SystemExit("経営分析レンダラーの挿入位置を確認できません。")
              owner=owner.replace(old_render,new_render,1)
          if "function renderManagement()" not in owner:
              marker='    function renderTeam(){'
              if owner.count(marker)!=1:
                  raise SystemExit("経営分析JavaScriptの挿入位置を確認できません。")
              owner=owner.replace(marker,owner_js+'\n'+marker,1)
          owner=owner.replace(OLD_VERSION,VERSION)
          owner=owner.replace('<title>オーナーPC管理 CAR-18｜DPRO中古車センター</title>','<title>オーナーPC管理 CAR-19｜DPRO中古車センター</title>',1)
          owner=owner.replace('買取から納車後まで、一元管理。','買取から経営分析まで、一元管理。',1)
          owner=owner.replace('査定・在庫・商談・試乗・契約・書類・納車フォローを同じ画面で確認します。','査定・在庫・商談・契約・納車・アフターケア・経営分析を同じ画面で確認します。',1)
          OWNER.write_text(owner,encoding="utf-8")
          CONFIG.write_text(base64.b64decode("").decode("utf-8"),encoding="utf-8")
          SYSTEM.write_text(base64.b64decode("").decode("utf-8"),encoding="utf-8")
          print("CAR-19 owner/config/system-check update: OK")
          PY

      - name: Validate CAR-19 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          files=["owner.html","system-check.html"]
          for filename in files:
              html=Path(filename).read_text(encoding="utf-8")
              scripts=[value for value in re.findall(r"<script(?:\s+[^>]*)?>(.*?)</script>",html,flags=re.S) if value.strip()]
              if not scripts:
                  raise SystemExit(f"{filename}のJavaScriptが見つかりません。")
              Path(f"/tmp/car19-{filename}.js").write_text(scripts[-1],encoding="utf-8")
              ids=re.findall(r'\bid="([^"]+)"',html)
              duplicates=sorted({value for value in ids if ids.count(value)>1})
              if duplicates:
                  raise SystemExit(f"{filename}に重複IDがあります: {duplicates}")
          required={
              "owner.html":["CAR-19-MANAGEMENT-ANALYTICS-20260723","view-management","renderManagement","経営・在庫・粗利","management-target-form"],
              "config.js":["CAR-19-MANAGEMENT-ANALYTICS-20260723","ownerManagementDashboard","ownerGrossProfit","ownerStaffPerformance"],
              "system-check.html":["CAR-19","car19_management_dashboard_schema","owner_management_dashboard","management_gross_profit_internal_guard"],
          }
          for filename,markers in required.items():
              text=Path(filename).read_text(encoding="utf-8")
              missing=[value for value in markers if value not in text]
              if missing:
                  raise SystemExit(f"{filename}の必須項目がありません: {missing}")
          print("CAR-19 frontend structure: OK")
          PY
          node --check /tmp/car19-owner.html.js
          node --check /tmp/car19-system-check.html.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("owner.html","config.js","system-check.html"):
              path=Path(filename)
              text=path.read_text(encoding="utf-8")
              path.write_text("\n".join(line.rstrip(" 	") for line in text.splitlines())+"\n",encoding="utf-8")
          PY
          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-19 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"
          git add owner.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-19-management-analytics.yml
          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi
          git commit -m "CAR-19: add management analytics and profit dashboard"
          git push origin main
