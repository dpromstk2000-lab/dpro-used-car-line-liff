name: DPRO CAR STEP CAR-17 Sale Contract Delivery Lifecycle

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-17-sale-contract-delivery-lifecycle.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-17
  cancel-in-progress: false

jobs:
  update-sale-contract-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-17 Worker and schema
        shell: bash
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request
          url="https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          expected="CAR-17-WORKER-SALE-CONTRACT-DELIVERY-LIFECYCLE-COMPLETE-20260723"
          headers={"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/150.0.0.0 Safari/537.36","Accept":"application/json,text/plain,*/*","Accept-Language":"ja,en-US;q=0.9,en;q=0.8","Origin":"https://dpromstk2000-lab.github.io","Referer":"https://dpromstk2000-lab.github.io/","Cache-Control":"no-cache"}
          data=None
          last_error=None
          for attempt in range(1,4):
              request=urllib.request.Request(f"{url}?car17_check={int(time.time())}",headers=headers,method="GET")
              try:
                  with urllib.request.urlopen(request,timeout=30) as response:
                      data=json.loads(response.read().decode("utf-8",errors="replace"))
                      break
              except urllib.error.HTTPError as error:
                  last_error=RuntimeError(f"HTTP {error.code}: {error.read().decode('utf-8',errors='replace')[:500]}")
              except Exception as error:
                  last_error=error
              if attempt<3: time.sleep(3)
          if data is None: raise SystemExit(f"Worker確認に失敗しました: {last_error}")
          if str(data.get("version") or "") != expected: raise SystemExit(f"Workerバージョン不一致 expected={expected} actual={data.get('version')}")
          checks=data.get("checks") or {}
          required=["owner_sale_contract_delivery_360_api_ready","owner_sale_contract_update_api_ready","owner_delivery_task_sync_ready","owner_delivery_completion_guard_ready","owner_delivery_followup_autocreate_ready","delivery_lifecycle_columns_ready","car17_delivery_lifecycle_schema"]
          missing=[key for key in required if checks.get(key) is not True]
          if missing: raise SystemExit(f"CAR-17 Worker・SQL確認に失敗しました: {missing}")
          print("CAR-17 Worker and schema: OK")
          PY

      - name: Apply CAR-17 owner and system-check update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          OWNER=Path("owner.html")
          CONFIG=Path("config.js")
          SYSTEM=Path("system-check.html")
          OLD_VERSION="CAR-16-R1-SALES-JOURNEY-CLARITY-20260723"
          VERSION="CAR-17-SALE-CONTRACT-DELIVERY-LIFECYCLE-20260723"

          if not OWNER.exists():
              raise SystemExit("owner.htmlが見つかりません。")
          owner=OWNER.read_text(encoding="utf-8")
          if OLD_VERSION not in owner:
              raise SystemExit("CAR-16-R1完成版owner.htmlを確認できません。")

          css=base64.b64decode("").decode("utf-8")
          functions=base64.b64decode("").decode("utf-8")
          config=base64.b64decode("").decode("utf-8")
          system=base64.b64decode("").decode("utf-8")

          if "CAR STEP CAR-17 SALE CONTRACT" not in owner:
              if owner.count("  </style>") != 1:
                  raise SystemExit("owner.htmlのCSS追加位置を特定できません。")
              owner=owner.replace("  </style>",css+"\n  </style>",1)

          old_close='drawer.classList.remove("customer-360","vehicle-lifecycle","sales-journey")'
          new_close='drawer.classList.remove("customer-360","vehicle-lifecycle","sales-journey","delivery-journey")'
          if old_close in owner:
              owner=owner.replace(old_close,new_close,1)
          elif new_close not in owner:
              raise SystemExit("詳細パネル終了処理を確認できません。")

          pattern=re.compile(
              r'    function renderContracts\(\)\{.*?\n    \}\n\n'
              r'    function renderDelivery\(\)\{.*?\n    \}\n\n'
              r'      function renderWork',
              re.S,
          )
          if pattern.search(owner):
              owner,count=pattern.subn(functions.rstrip()+"\n\n      function renderWork",owner,count=1)
              if count != 1:
                  raise SystemExit("契約・納車画面の置換に失敗しました。")
          elif "function openDeliveryJourney" not in owner:
              raise SystemExit("契約・納車画面の置換対象を確認できません。")

          owner=owner.replace(OLD_VERSION,VERSION)
          owner=re.sub(
              r'<title>オーナーPC管理 [^<]+｜DPRO中古車センター</title>',
              '<title>オーナーPC管理 CAR-17｜DPRO中古車センター</title>',
              owner,
              count=1,
          )
          required=[VERSION,"販売契約から納車まで360度","function openDeliveryJourney","function renderDeliveryJourney","function saleContractCard","納車完了を記録","必要タスクを同期"]
          missing=[value for value in required if value not in owner]
          if missing:
              raise SystemExit(f"owner.html検査失敗: {missing}")
          OWNER.write_text(owner,encoding="utf-8")
          CONFIG.write_text(config,encoding="utf-8")
          SYSTEM.write_text(system,encoding="utf-8")
          print("CAR-17 frontend update: OK")
          PY

      - name: Validate CAR-17 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          for filename in ("owner.html","config.js","system-check.html"):
              if not Path(filename).exists(): raise SystemExit(f"{filename} が見つかりません。")
          owner=Path("owner.html").read_text(encoding="utf-8")
          system=Path("system-check.html").read_text(encoding="utf-8")
          owner_scripts=re.findall(r"<script>(.*?)</script>",owner,flags=re.S)
          system_scripts=re.findall(r"<script>(.*?)</script>",system,flags=re.S)
          if not owner_scripts or not system_scripts: raise SystemExit("JavaScript抽出に失敗しました。")
          Path("/tmp/car17-owner.js").write_text(owner_scripts[-1],encoding="utf-8")
          Path("/tmp/car17-system.js").write_text(system_scripts[-1],encoding="utf-8")
          ids=re.findall(r'\bid="([^"]+)"',owner)
          duplicates=sorted({value for value in ids if ids.count(value)>1})
          if duplicates: raise SystemExit(f"owner.htmlに重複IDがあります: {duplicates}")
          required=["販売契約から納車まで360度","入金・書類","名義変更・登録","点検・納車準備","納車完了を記録","CAR-17-SALE-CONTRACT-DELIVERY-LIFECYCLE-20260723"]
          missing=[value for value in required if value not in owner]
          if missing: raise SystemExit(f"CAR-17必須表示が不足しています: {missing}")
          if "car17_delivery_lifecycle_schema" not in system: raise SystemExit("system-check.htmlにCAR-17検査がありません。")
          print("CAR-17 HTML structure: OK")
          PY

          node --check /tmp/car17-owner.js
          node --check /tmp/car17-system.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("owner.html","config.js","system-check.html"):
              path=Path(filename)
              text=path.read_text(encoding="utf-8")
              path.write_text("\n".join(line.rstrip(" \t") for line in text.splitlines())+"\n",encoding="utf-8")
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-17 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-17-sale-contract-delivery-lifecycle.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-17: unify sale contract and delivery lifecycle"
          git push origin main
