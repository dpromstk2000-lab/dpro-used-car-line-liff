name: DPRO CAR STEP CAR-12 Owner NEXT

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-12-owner-next.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-12
  cancel-in-progress: false

jobs:
  update-owner-next:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply CAR-12 owner UI update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          OWNER = Path("owner.html")
          CONFIG = Path("config.js")
          VERSION = "CAR-12-OWNER-PC-NEXT-20260722"

          if not OWNER.exists():
              raise SystemExit("owner.html が見つかりません。")
          if not CONFIG.exists():
              raise SystemExit("config.js が見つかりません。")

          owner = OWNER.read_text(encoding="utf-8")
          config = CONFIG.read_text(encoding="utf-8")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が {count} 件でした。1件である必要があります。")
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label, flags=0):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が {count} 件でした。1件である必要があります。")
              return updated

          if VERSION not in owner:
              css = r'''
              /* =========================================================
                 DPRO CAR STEP CAR-12 OWNER NEXT
                 ========================================================= */
              body.simple-mode .advanced-only{display:none!important}
              .mode-button.on{border-color:#f1b84a;background:#f1b84a;color:#14263a}
              .quick-bar{margin:0 0 18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
              .quick-action{min-height:62px;padding:10px 12px;border:1px solid #c4d0d9;border-radius:14px;background:#fff;color:var(--navy);font-weight:900;cursor:pointer;box-shadow:0 6px 18px rgba(16,36,62,.05)}
              .quick-action:hover{border-color:var(--amber);background:var(--amber2)}
              .today-grid{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(330px,.85fr);gap:16px}
              .priority-list{display:grid;gap:10px}
              .priority-item{padding:15px 16px;border:1px solid var(--line);border-left:5px solid var(--amber);border-radius:0 13px 13px 0;background:#fff}
              .priority-item.danger{border-left-color:var(--red);background:#fff6f4}
              .priority-item strong{display:block}
              .priority-item span{display:block;color:var(--muted);font-size:14px}
              .detail-open{width:100%;margin-top:12px}
              .detail-overlay{position:fixed;inset:0;z-index:60;background:rgba(5,18,30,.55);backdrop-filter:blur(2px);opacity:0;transition:opacity .18s ease}
              .detail-overlay.open{opacity:1}
              .detail-drawer{position:fixed;z-index:61;top:0;right:0;width:min(520px,100%);height:100dvh;display:flex;flex-direction:column;background:#fff;box-shadow:-24px 0 70px rgba(0,0,0,.25);transform:translateX(102%);transition:transform .2s ease}
              .detail-drawer.open{transform:translateX(0)}
              .detail-head{padding:19px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;background:var(--navy);color:#fff}
              .detail-head h2{margin:0;font-size:24px;line-height:1.3}
              .detail-head p{margin:3px 0 0;color:#cddae4;font-size:13px}
              .detail-close{min-width:48px;min-height:48px;border:1px solid rgba(255,255,255,.25);border-radius:12px;background:transparent;color:#fff;font-weight:900;cursor:pointer}
              .detail-body{min-height:0;overflow:auto;padding:20px}
              .detail-status{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;padding:13px 14px;border-radius:13px;background:var(--soft)}
              .detail-data{display:grid;grid-template-columns:1fr 1fr;gap:9px}
              .detail-data div{padding:11px 12px;border-radius:11px;background:var(--soft)}
              .detail-data span{display:block;color:var(--muted);font-size:12px;font-weight:800}
              .detail-data strong{display:block;overflow-wrap:anywhere}
              .detail-note{margin-top:14px;padding:13px 14px;border-left:5px solid var(--amber);border-radius:0 11px 11px 0;background:#fff8e8;white-space:pre-wrap}
              .simple-note{margin-bottom:16px;padding:12px 14px;border-radius:12px;background:#eaf5f1;color:#14634e;font-weight:800}
              @media(max-width:1100px){.quick-bar{grid-template-columns:repeat(2,1fr)}.today-grid{grid-template-columns:1fr}}
              @media(max-width:760px){.detail-drawer{top:auto;bottom:0;width:100%;height:min(88dvh,820px);border-radius:22px 22px 0 0;transform:translateY(102%)}.detail-drawer.open{transform:translateY(0)}.detail-data{grid-template-columns:1fr}}
              @media(max-width:560px){.quick-bar{grid-template-columns:1fr 1fr;gap:8px}.quick-action{min-height:56px;font-size:14px}.top-links{overflow-x:auto}.mode-button{white-space:nowrap}.mobile-nav{overflow-x:auto;display:flex!important;justify-content:flex-start!important}.mobile-nav .nav-button{flex:0 0 132px}}
              '''
              owner = replace_once(owner, "  </style>", css + "\n  </style>", "CAR-12 CSS追加")

              owner = replace_once(
                  owner,
                  '<button class="top-link logout-label" id="topLogout"',
                  '<button class="top-link mode-button on" id="simpleModeToggle" type="button" aria-pressed="true">簡単モード ON</button><button class="top-link logout-label" id="topLogout"',
                  "簡単モードボタン追加",
              )

              owner = owner.replace(
                  "<b>CAR-10-R1 OWNER PC</b>",
                  f"<b>{VERSION}</b>",
                  1,
              )

              owner = replace_once(
                  owner,
                  '<section class="section-view" id="view-dashboard"></section>',
                  '<section class="section-view" id="view-dashboard"></section>\n'
                  '        <section class="section-view" id="view-today" hidden></section>',
                  "本日の予定画面追加",
              )

              owner = replace_once(
                  owner,
                  '<section class="section-view" id="view-work" hidden></section>',
                  '<section class="section-view" id="view-work" hidden></section>\n'
                  '        <section class="section-view" id="view-contracts" hidden></section>\n'
                  '        <section class="section-view" id="view-delivery" hidden></section>',
                  "契約・納車画面追加",
              )

              drawer = r'''
              <div class="detail-overlay" id="detailOverlay" hidden></div>
              <aside class="detail-drawer" id="detailDrawer" hidden aria-labelledby="detailTitle" aria-modal="true" role="dialog">
                <header class="detail-head">
                  <div><h2 id="detailTitle">詳細情報</h2><p id="detailSubtitle"></p></div>
                  <button class="detail-close" id="detailClose" type="button" aria-label="詳細を閉じる">閉じる</button>
                </header>
                <div class="detail-body" id="detailBody"></div>
              </aside>
              '''
              owner = replace_once(
                  owner,
                  '  <div class="toast" id="toast" hidden role="status"></div>',
                  drawer + '\n  <div class="toast" id="toast" hidden role="status"></div>',
                  "右側詳細パネル追加",
              )

              owner = regex_once(
                  owner,
                  r'const state=\{adminKey:"",data:null,active:"dashboard",busy:false\};',
                  'const state={adminKey:"",data:null,active:"dashboard",busy:false,simpleMode:config.ownerSimpleMode!==false,rendered:new Set()};',
                  "state拡張",
              )

              sections = r'''      const sections=[
                {id:"dashboard",icon:"▦",label:"ホーム",kicker:"OWNER HOME",title:"ホーム",description:"未対応・期限超過・本日の重要事項を先に確認します。",count:d=>(d.dashboard?.open_tasks||0)+(d.dashboard?.unanswered_inquiries||0)},
                {id:"today",icon:"日",label:"本日の予定",kicker:"TODAY'S SCHEDULE",title:"本日の予定",description:"査定・来店・試乗・納車を時間順に確認します。",count:d=>(d.reservations||[]).filter(x=>isToday(x.start_at)&&!["cancelled","no_show"].includes(x.status)).length},
                {id:"appraisals",icon:"￥",label:"査定",kicker:"APPRAISAL & PURCHASE",title:"査定・買取管理",description:"受付から査定額提示、契約、引取までを管理します。",count:d=>(d.appraisals||[]).filter(x=>!["completed","cancelled","declined","expired"].includes(x.status)).length},
                {id:"search",icon:"客",label:"顧客・車両",kicker:"CUSTOMER & VEHICLE",title:"顧客・車両検索",description:"電話番号・氏名・顧客番号・登録番号・車台番号で横断検索します。",count:()=>0},
                {id:"inventory",icon:"車",label:"販売在庫",kicker:"INVENTORY CONTROL",title:"販売在庫管理",description:"仕入・商品化・公開・商談中・販売済みを確認します。",count:d=>(d.inventory||[]).length},
                {id:"sales",icon:"商",label:"商談",kicker:"SALES CONTROL",title:"購入商談・予約",description:"購入相談、見積、ローン、来店・試乗予約を確認します。",count:d=>(d.sales_leads||[]).filter(x=>!["delivered","lost","cancelled"].includes(x.status)).length},
                {id:"contracts",icon:"書",label:"契約・書類",kicker:"CONTRACT & DOCUMENT",title:"契約・必要書類",description:"買取契約・販売契約・必要書類をまとめて確認します。",count:d=>(d.documents||[]).filter(x=>["missing","requested","rejected"].includes(x.status)).length},
                {id:"delivery",icon:"納",label:"納車・フォロー",kicker:"DELIVERY & FOLLOW",title:"納車・アフターフォロー",description:"納車準備、納車予定、納車後の連絡を確認します。",count:d=>(d.followups||[]).filter(x=>["pending","prepared"].includes(x.status)).length},
                {id:"team",icon:"設",label:"設定",kicker:"STORE SETTINGS",title:"店舗・担当者設定",description:"営業時間・定休日・受付上限と担当者を確認します。",count:d=>(d.staff||[]).length},
              ];'''
              owner = regex_once(
                  owner,
                  r'      const sections=\[\n.*?\n      \];',
                  sections,
                  "左メニュー再編",
                  re.S,
              )

              open_section = r'''      function renderSection(id,force=false){
                if(!state.data)return;
                if(!force&&state.rendered.has(id))return;
                const renderers={dashboard:renderDashboard,today:renderToday,appraisals:renderAppraisals,search:renderSearch,inventory:renderInventory,sales:renderSales,contracts:renderContracts,delivery:renderDelivery,team:renderTeam};
                const render=renderers[id];
                if(render){render();state.rendered.add(id)}
              }
              function applySimpleMode(){
                document.body.classList.toggle("simple-mode",state.simpleMode);
                const button=document.getElementById("simpleModeToggle");
                button.classList.toggle("on",state.simpleMode);
                button.setAttribute("aria-pressed",String(state.simpleMode));
                button.textContent=state.simpleMode?"簡単モード ON":"詳細モード";
              }
              function openSection(id){
                state.active=id;
                renderSection(id);
                sections.forEach(s=>document.getElementById(`view-${s.id}`).hidden=s.id!==id);
                const s=sections.find(x=>x.id===id);
                document.getElementById("pageKicker").textContent=s.kicker;
                document.getElementById("pageTitle").textContent=s.title;
                document.getElementById("pageDescription").textContent=s.description;
                makeNav(document.getElementById("desktopNav"));
                makeNav(document.getElementById("mobileNav"));
                scrollTo({top:0,behavior:"smooth"});
              }
              function metric'''
              owner = regex_once(
                  owner,
                  r'      function openSection\(id\)\{.*?\}\n      function metric',
                  open_section,
                  "遅延描画と画面切替",
                  re.S,
              )

              detail_helpers = r'''
              const jstDateKey=value=>{
                if(!value)return"";
                const d=new Date(value);
                if(Number.isNaN(d.getTime()))return"";
                return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).format(d);
              };
              const isToday=value=>jstDateKey(value)===jstDateKey(new Date());
              function openDetail({title,number,resource,item,items=[],priceTitle,priceValue,note}){
                const drawer=document.getElementById("detailDrawer"),overlay=document.getElementById("detailOverlay"),body=document.getElementById("detailBody");
                document.getElementById("detailTitle").textContent=title||"詳細情報";
                document.getElementById("detailSubtitle").textContent=number||"";
                clear(body);
                if(state.simpleMode)body.append(el("div","simple-note","簡単モードでは日常操作に必要な情報を優先して表示しています。"));
                const status=el("div","detail-status");
                status.append(el("strong","",resource?label(resource,item.status):"詳細"),el("span",`badge ${resource?badgeClass(resource,item.status):""}`,resource?label(resource,item.status):"確認"));
                body.append(status);
                const grid=el("div","detail-data");
                items.filter(x=>x[1]!==null&&x[1]!==undefined&&x[1]!=="").forEach(([key,value,visibility])=>{
                  const box=el("div",visibility==="advanced"?"advanced-only":"");
                  box.append(el("span","",key),el("strong","",String(value)));
                  grid.append(box);
                });
                if(priceTitle&&priceValue!==null&&priceValue!==undefined){
                  const box=el("div");
                  box.append(el("span","",priceTitle),el("strong","",money(priceValue)));
                  grid.append(box);
                }
                if(grid.children.length)body.append(grid);
                if(note)body.append(el("div","detail-note",note));
                overlay.hidden=false;drawer.hidden=false;
                requestAnimationFrame(()=>{overlay.classList.add("open");drawer.classList.add("open")});
                document.body.style.overflow="hidden";
                document.getElementById("detailClose").focus();
              }
              function closeDetail(){
                const drawer=document.getElementById("detailDrawer"),overlay=document.getElementById("detailOverlay");
                drawer.classList.remove("open");overlay.classList.remove("open");
                document.body.style.overflow="";
                setTimeout(()=>{drawer.hidden=true;overlay.hidden=true},210);
              }
              '''
              owner = replace_once(
                  owner,
                  '      function empty(text){return el("div","empty",text)}',
                  '      function empty(text){return el("div","empty",text)}\n' + detail_helpers,
                  "詳細パネル関数追加",
              )

              meta_function = r'''      function meta(card,items){
                const grid=el("div","meta");
                items.filter(x=>x[1]!==null&&x[1]!==undefined&&x[1]!=="").forEach(([key,value,visibility])=>{
                  const box=el("div",visibility==="advanced"?"advanced-only":"");
                  box.append(el("span","",key),el("strong","",String(value)));
                  grid.append(box);
                });
                if(grid.children.length)card.append(grid);
              }
              function moneyBox'''
              owner = regex_once(
                  owner,
                  r'      function meta\(card,items\)\{.*?\}\n      function moneyBox',
                  meta_function,
                  "詳細項目の表示制御",
                  re.S,
              )

              record_function = r'''      function recordCard(args){
                const{title,number,resource,item,items=[],priceTitle,priceValue,note,attention=false}=args;
                const card=el("article",`record-card${attention?" attention":""}`),top=el("div","record-top"),head=el("div","record-title");
                head.append(el("h3","",title),el("p","",number||""));
                top.append(head,el("span",`badge ${badgeClass(resource,item.status)}`,label(resource,item.status)));
                card.append(top);
                meta(card,items);
                moneyBox(card,priceTitle,priceValue);
                if(note)card.append(el("p","internal-note",note));
                statusControl(card,resource,item);
                const detail=el("button","button detail-open","詳細を見る");
                detail.type="button";
                detail.addEventListener("click",()=>openDetail(args));
                card.append(detail);
                return card;
              }
              function statusControl'''
              owner = regex_once(
                  owner,
                  r'      function recordCard\(\{.*?\}\n      function statusControl',
                  record_function,
                  "カード詳細ボタン追加",
                  re.S,
              )

              quick = r'''root.append(metrics);
                const quick=el("div","quick-bar");
                [["本日の予定","today"],["査定を確認","appraisals"],["顧客・車両検索","search"],["契約・書類","contracts"]].forEach(([text,id])=>{
                  const button=el("button","quick-action",text);
                  button.type="button";
                  button.addEventListener("click",()=>openSection(id));
                  quick.append(button);
                });
                root.append(quick);'''
              owner = replace_once(
                  owner,
                  "root.append(metrics);",
                  quick,
                  "ホームのクイック操作追加",
              )

              today_function = r'''
              function renderToday(){
                const root=document.getElementById("view-today");
                clear(root);
                const todayReservations=(state.data.reservations||[]).filter(x=>isToday(x.start_at)&&!["cancelled","no_show"].includes(x.status)).sort((a,b)=>Date.parse(a.start_at)-Date.parse(b.start_at));
                root.append(sectionHeader("本日の予定","査定・来店・試乗・納車を時間順に表示",todayReservations.length));
                const layout=el("div","today-grid"),schedule=panel("時間順の予定","来店前から完了まで"),scheduleList=el("div","stack");
                todayReservations.forEach(x=>scheduleList.append(recordCard({
                  title:`${dateTime(x.start_at)}　${typeLabels.reservation_type[x.reservation_type]||x.reservation_type}`,
                  number:`${x.reservation_number}／${customerName(x.customer)}`,
                  resource:"reservation",item:x,
                  items:[["終了",dateTime(x.end_at)],["車両",vehicleName(x.inventory)],["担当",x.assigned_staff?.staff_name||"未設定"],["店舗",x.store?.store_name||"未設定"]],
                  note:x.internal_note||x.customer_note,
                  attention:["reserved","confirmed"].includes(x.status)
                })));
                if(!todayReservations.length)scheduleList.append(empty("本日の予約はありません。"));
                schedule.body.append(scheduleList);

                const priority=panel("本日の優先対応","未対応・期限超過・査定額・必要書類"),priorityList=el("div","priority-list");
                const overdue=(state.data.tasks||[]).filter(x=>["open","in_progress"].includes(x.status)&&x.due_at&&Date.parse(x.due_at)<Date.now());
                const inquiries=(state.data.inquiries||[]).filter(x=>["new","in_progress"].includes(x.status));
                const appraisals=(state.data.appraisals||[]).filter(x=>["new","checking","price_ready"].includes(x.status));
                const documents=(state.data.documents||[]).filter(x=>["missing","requested","rejected"].includes(x.status));
                const addPriority=(title,text,danger=false)=>{
                  const item=el("article",`priority-item${danger?" danger":""}`);
                  item.append(el("strong","",title),el("span","",text));
                  priorityList.append(item);
                };
                overdue.slice(0,4).forEach(x=>addPriority(`期限超過：${x.title}`,`${dateTime(x.due_at)}／${x.assigned_staff?.staff_name||"担当未設定"}`,true));
                inquiries.slice(0,3).forEach(x=>addPriority(`未対応：${x.subject}`,`${customerName(x.customer)}／${x.inquiry_number}`));
                appraisals.slice(0,3).forEach(x=>addPriority(`査定確認：${x.case_number}`,`${customerName(x.customer)}／${label("appraisal",x.status)}`));
                documents.slice(0,3).forEach(x=>addPriority(`必要書類：${x.document_label}`,`${customerName(x.customer)}／${label("document",x.status)}`));
                if(!priorityList.children.length)priorityList.append(empty("本日の優先対応はありません。"));
                priority.body.append(priorityList);
                layout.append(schedule.panel,priority.panel);
                root.append(layout);
              }
              '''
              owner = replace_once(
                  owner,
                  "      function renderAppraisals(){",
                  today_function + "\n      function renderAppraisals(){",
                  "本日の予定描画追加",
              )

              contract_delivery = r'''
              function renderContracts(){
                const root=document.getElementById("view-contracts");
                clear(root);
                const purchase=state.data.purchase_contracts||[],sale=state.data.sale_contracts||[],documents=state.data.documents||[];
                root.append(sectionHeader("契約・必要書類","買取契約・販売契約・不足書類をまとめて確認",purchase.length+sale.length+documents.length));
                root.append(subhead("買取契約",purchase.length));
                const purchaseGrid=el("div","record-grid");
                purchase.forEach(x=>purchaseGrid.append(recordCard({
                  title:vehicleName(x.vehicle),number:`${x.contract_number}／${customerName(x.customer)}`,
                  resource:"purchase_contract",item:x,
                  items:[["査定受付",x.appraisal_case_number],["契約日",date(x.contract_date)],["引取予定",dateTime(x.pickup_at)],["書類",x.documents_complete?"確認済み":"確認中"],["支払方法",x.payment_method||"未設定"]],
                  priceTitle:"買取金額",priceValue:x.purchase_price,note:x.note,
                  attention:["draft","documents_waiting","payment_pending"].includes(x.status)
                })));
                if(!purchaseGrid.children.length)purchaseGrid.append(empty("買取契約はありません。"));
                root.append(purchaseGrid,subhead("販売契約",sale.length));
                const saleGrid=el("div","record-grid");
                sale.forEach(x=>saleGrid.append(recordCard({
                  title:vehicleName(x.inventory),number:`${x.contract_number}／${customerName(x.customer)}`,
                  resource:"sale_contract",item:x,
                  items:[["契約日",date(x.contract_date)],["納車予定",dateTime(x.delivery_scheduled_at)],["書類",x.documents_complete?"確認済み":"確認中"],["ローン",x.financing_requested?x.loan_status:"利用なし"],["入金額",money(x.deposit_amount)]],
                  priceTitle:"契約総額",priceValue:x.total_price,note:x.note,
                  attention:["draft","loan_review","documents_waiting"].includes(x.status)
                })));
                if(!saleGrid.children.length)saleGrid.append(empty("販売契約はありません。"));
                root.append(saleGrid,subhead("必要書類",documents.length));
                const documentGrid=el("div","record-grid");
                documents.forEach(x=>documentGrid.append(recordCard({
                  title:x.document_label,number:customerName(x.customer),
                  resource:"document",item:x,
                  items:[["期限",date(x.due_date)],["受領",dateTime(x.received_at)],["確認",dateTime(x.verified_at)],["区分",x.document_type]],
                  note:x.note,attention:["missing","requested","rejected"].includes(x.status)
                })));
                if(!documentGrid.children.length)documentGrid.append(empty("必要書類はありません。"));
                root.append(documentGrid);
              }

              function renderDelivery(){
                const root=document.getElementById("view-delivery");
                clear(root);
                const deliveryContracts=(state.data.sale_contracts||[]).filter(x=>["delivery_preparing","delivery_scheduled","delivered"].includes(x.status));
                const deliveryReservations=(state.data.reservations||[]).filter(x=>x.reservation_type==="delivery"&&!["cancelled","no_show"].includes(x.status));
                const followups=state.data.followups||[];
                root.append(sectionHeader("納車・フォロー","納車準備から納車後の連絡まで確認",deliveryContracts.length+deliveryReservations.length+followups.length));
                root.append(subhead("納車準備・納車予定",deliveryContracts.length+deliveryReservations.length));
                const deliveryGrid=el("div","record-grid");
                deliveryContracts.forEach(x=>deliveryGrid.append(recordCard({
                  title:vehicleName(x.inventory),number:`${x.contract_number}／${customerName(x.customer)}`,
                  resource:"sale_contract",item:x,
                  items:[["納車予定",dateTime(x.delivery_scheduled_at)],["書類",x.documents_complete?"確認済み":"確認中"],["入金額",money(x.deposit_amount)]],
                  priceTitle:"契約総額",priceValue:x.total_price,note:x.note,
                  attention:["delivery_preparing","delivery_scheduled"].includes(x.status)
                })));
                deliveryReservations.forEach(x=>deliveryGrid.append(recordCard({
                  title:"納車予約",number:`${x.reservation_number}／${customerName(x.customer)}`,
                  resource:"reservation",item:x,
                  items:[["日時",dateTime(x.start_at)],["車両",vehicleName(x.inventory)],["担当",x.assigned_staff?.staff_name||"未設定"],["店舗",x.store?.store_name||"未設定"]],
                  note:x.internal_note||x.customer_note,
                  attention:["reserved","confirmed"].includes(x.status)
                })));
                if(!deliveryGrid.children.length)deliveryGrid.append(empty("納車準備・納車予定はありません。"));
                root.append(deliveryGrid,subhead("納車後フォロー",followups.length));
                const followGrid=el("div","record-grid");
                followups.forEach(x=>followGrid.append(recordCard({
                  title:typeLabels.followup_type[x.followup_type]||x.followup_type,
                  number:customerName(x.customer),resource:"followup",item:x,
                  items:[["予定日",date(x.scheduled_date)],["車両",vehicleName(x.inventory||x.vehicle)],["担当",x.assigned_staff?.staff_name||"未設定"]],
                  note:x.message_text||x.note,attention:["pending","prepared"].includes(x.status)
                })));
                if(!followGrid.children.length)followGrid.append(empty("納車後フォローはありません。"));
                root.append(followGrid);
              }
              '''
              owner = replace_once(
                  owner,
                  "      function renderWork(){",
                  contract_delivery + "\n      function renderWork(){",
                  "契約・納車描画追加",
              )

              owner = replace_once(
                  owner,
                  '["仕入・商品化原価",money(cost)],["概算粗利",money(gross)]',
                  '["仕入・商品化原価",money(cost),"advanced"],["概算粗利",money(gross),"advanced"]',
                  "原価・粗利の簡単モード制御",
              )

              render_all = r'''      function renderAll(){
                document.getElementById("sideCompany").textContent=state.data.company.company_name;
                document.getElementById("updatedAt").textContent=`最終取得 ${new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(new Date())}`;
                state.rendered.clear();
                makeNav(document.getElementById("desktopNav"));
                makeNav(document.getElementById("mobileNav"));
                openSection(state.active);
                applySimpleMode();
              }
              async function reloadOverview'''
              owner = regex_once(
                  owner,
                  r'      function renderAll\(\)\{.*?\}\n      async function reloadOverview',
                  render_all,
                  "表示中画面だけの遅延描画",
                  re.S,
              )

              event_code = r'''
              document.getElementById("simpleModeToggle").addEventListener("click",()=>{
                state.simpleMode=!state.simpleMode;
                applySimpleMode();
                showToast(state.simpleMode?"簡単モードへ切り替えました。":"詳細モードへ切り替えました。");
              });
              document.getElementById("detailClose").addEventListener("click",closeDetail);
              document.getElementById("detailOverlay").addEventListener("click",closeDetail);
              document.addEventListener("keydown",event=>{
                if(event.key==="Escape"&&!document.getElementById("detailDrawer").hidden)closeDetail();
              });
              '''
              owner = replace_once(
                  owner,
                  '      if(isDemo){adminInput.value="1234";setTimeout(login,120)}else{adminInput.focus()}',
                  event_code + '\n      if(isDemo){adminInput.value="1234";setTimeout(login,120)}else{adminInput.focus()}',
                  "簡単モードと詳細パネルのイベント追加",
              )

              owner = owner.replace(
                  '<title>オーナーPC管理｜DPRO中古車センター</title>',
                  '<title>オーナーPC管理 CAR-12｜DPRO中古車センター</title>',
                  1,
              )

              marker = f'<!-- {VERSION} -->'
              owner = owner.replace("</head>", f"  {marker}\n</head>", 1)

          config = re.sub(
              r'version:\s*"[^"]+"',
              f'version: "{VERSION}"',
              config,
              count=1,
          )
          config = config.replace(
              " * STEP CAR-10 共通設定",
              " * STEP CAR-12 オーナーPC NEXT共通設定",
              1,
          )
          if "listingPhotoMaxCount" not in config:
              config = replace_once(
                  config,
                  "  maxPhotoSizeBytes: 5 * 1024 * 1024,",
                  "  maxPhotoSizeBytes: 5 * 1024 * 1024,\n"
                  "  appraisalPhotoMaxCount: 8,\n"
                  "  listingPhotoMaxCount: 12,\n"
                  "  ownerSimpleMode: true,\n"
                  "  ownerDetailPanel: true,\n"
                  "  ownerLazyRender: true,",
                  "CAR-12共通設定追加",
              )

          required_owner_markers = [
              VERSION,
              'id="view-today"',
              'id="view-contracts"',
              'id="view-delivery"',
              'id="simpleModeToggle"',
              'id="detailDrawer"',
              "function renderToday()",
              "function renderContracts()",
              "function renderDelivery()",
              "function renderSection(id,force=false)",
          ]
          missing = [marker for marker in required_owner_markers if marker not in owner]
          if missing:
              raise SystemExit(f"owner.html 検査失敗。未反映: {missing}")

          ids = re.findall(r'\bid="([^"]+)"', owner)
          duplicate_ids = sorted({item for item in ids if ids.count(item) > 1})
          if duplicate_ids:
              raise SystemExit(f"owner.html に重複IDがあります: {duplicate_ids}")

          if VERSION not in config:
              raise SystemExit("config.js のバージョン更新に失敗しました。")
          if config.count("listingPhotoMaxCount") != 1:
              raise SystemExit("config.js の公開写真設定が重複しています。")

          OWNER.write_text(owner, encoding="utf-8")
          CONFIG.write_text(config, encoding="utf-8")

          print("CAR-12 差分更新完了")
          print(f"owner.html: {len(owner):,} bytes")
          print(f"config.js: {len(config):,} bytes")
          PY

      - name: Validate JavaScript and required UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          owner = Path("owner.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script>(.*?)</script>", owner, flags=re.S)
          if not scripts:
              raise SystemExit("owner.html のインラインJavaScriptが見つかりません。")
          Path("/tmp/car-owner-inline.js").write_text(scripts[-1], encoding="utf-8")

          required = [
              "ホーム",
              "本日の予定",
              "査定",
              "顧客・車両",
              "販売在庫",
              "商談",
              "契約・書類",
              "納車・フォロー",
              "設定",
              "簡単モード ON",
              "詳細を見る",
          ]
          missing = [text for text in required if text not in owner]
          if missing:
              raise SystemExit(f"必要表示が不足しています: {missing}")

          print("HTML構成検査: OK")
          PY

          node --check /tmp/car-owner-inline.js
          node --check config.js

      - name: Show changed files
        shell: bash
        run: |
          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-12 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js
          git rm --ignore-unmatch .github/workflows/step-car-12-owner-next.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-12: improve owner PC navigation and daily workflow"
          git push origin main
