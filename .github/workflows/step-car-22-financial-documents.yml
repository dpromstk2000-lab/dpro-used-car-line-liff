name: DPRO CAR STEP CAR-22 Financial Documents

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-22-financial-documents.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-22
  cancel-in-progress: false

jobs:
  update-financial-documents:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-22 Worker and SQL
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          url="https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          request=urllib.request.Request(url,headers={"Accept":"application/json","User-Agent":"Mozilla/5.0","Origin":"https://dpromstk2000-lab.github.io"})
          try:
              with urllib.request.urlopen(request,timeout=25) as response:
                  data=json.load(response)
          except urllib.error.HTTPError as error:
              if error.code==403:
                  print("::warning::GitHub ActionsからWorkerへの確認だけがHTTP 403でした。ブラウザ確認を前提に続行します。")
                  raise SystemExit(0)
              raise
          if data.get("version")!="CAR-22-WORKER-FINANCIAL-DOCUMENTS-ISSUE-REISSUE-COMPLETE-20260724":
              raise SystemExit(f"WorkerがCAR-22ではありません: {data.get('version')}")
          checks=data.get("checks") or {}
          required=["car22_financial_documents_schema","owner_financial_document_overview_ready","owner_financial_document_create_ready","financial_document_issue_snapshot_lock_ready","financial_document_reissue_history_ready","financial_document_void_reason_guard_ready","member_financial_documents_ready","browser_print_pdf_ready","server_pdf_generation_disabled","admin_guard"]
          failed=[key for key in required if checks.get(key) is not True]
          if failed:
              raise SystemExit(f"CAR-22 Worker/SQL確認失敗: {failed}")
          print("CAR-22 Worker/SQL: OK")
          PY

      - name: Apply CAR-22 frontend update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          OWNER=Path("owner.html")
          MEMBER=Path("member.html")
          CONFIG=Path("config.js")
          SYSTEM=Path("system-check.html")

          for path in (OWNER,MEMBER,CONFIG,SYSTEM):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")

          owner=OWNER.read_text(encoding="utf-8")
          member=MEMBER.read_text(encoding="utf-8")
          config=CONFIG.read_text(encoding="utf-8")
          system=SYSTEM.read_text(encoding="utf-8")

          old="CAR-21-R2-PAYMENT-METHOD-JAPANESE-20260724"
          new="CAR-22-FINANCIAL-DOCUMENTS-PRINT-MEMBER-20260724"
          if old not in owner or old not in config:
              raise SystemExit("CAR-21-R2フロントエンドを確認できません。")

          owner_css=base64.b64decode("").decode("utf-8")
          owner_js=base64.b64decode("").decode("utf-8")
          member_css=base64.b64decode("").decode("utf-8")
          member_js=base64.b64decode("").decode("utf-8")

          if "DPRO CAR STEP CAR-22 FINANCIAL DOCUMENTS" not in owner:
              owner=owner.replace("</style>",owner_css+"\n  </style>",1)

          payment_view='        <section class="section-view" id="view-payments" hidden></section>'
          if 'id="view-financials"' not in owner:
              if owner.count(payment_view)!=1:
                  raise SystemExit("帳票画面の追加位置を確認できません。")
              owner=owner.replace(payment_view,payment_view+'\n        <section class="section-view" id="view-financials" hidden></section>',1)

          payment_section='      {id:"payments",icon:"払",label:"入出金",kicker:"PAYMENT & CASHFLOW",title:"入出金・未収金",description:"販売代金、買取支払、経費、返金、未収金、支払予定を管理します。",count:()=>0},'
          if 'id:"financials"' not in owner:
              if owner.count(payment_section)!=1:
                  raise SystemExit("帳票メニューの追加位置を確認できません。")
              owner=owner.replace(payment_section,payment_section+'\n      {id:"financials",icon:"票",label:"帳票",kicker:"FINANCIAL DOCUMENTS",title:"請求書・領収書・精算書",description:"入出金・契約から帳票を作成し、発行・再発行・無効化を管理します。",count:()=>0},',1)

          renderer='payments:renderPayments,team:renderTeam'
          if 'financials:renderFinancials' not in owner:
              if owner.count(renderer)!=1:
                  raise SystemExit("帳票レンダラーの追加位置を確認できません。")
              owner=owner.replace(renderer,'payments:renderPayments,financials:renderFinancials,team:renderTeam',1)

          if "const CAR22_TYPE_LABEL=" not in owner:
              marker='    function renderTeam(){'
              if owner.count(marker)!=1:
                  raise SystemExit("CAR-22 JavaScript追加位置を確認できません。")
              owner=owner.replace(marker,owner_js+"\n"+marker,1)

          owner=owner.replace(old,new)
          owner=owner.replace("<title>オーナーPC管理 CAR-21｜DPRO中古車センター</title>","<title>オーナーPC管理 CAR-22｜DPRO中古車センター</title>",1)
          owner=owner.replace("買取から入出金管理まで、一元管理。","買取から帳票発行まで、一元管理。",1)
          owner=owner.replace("査定・在庫・商談・契約・納車・アフターケア・経営分析・連絡・入出金を同じ画面で確認します。","査定・在庫・契約・入出金・請求書・領収書・精算書を同じ画面で確認します。",1)

          config=config.replace(" * STEP CAR-21 入出金・未収金・支払・精算管理"," * STEP CAR-22 請求書・領収書・買取支払明細・精算書管理",1)
          config=re.sub(r'version:\s*"[^"]+"',f'version: "{new}"',config,count=1)
          config=config.replace("  paymentBankAutoSync: false,","  paymentBankAutoSync: false,\n  ownerFinancialDocuments: true,\n  memberFinancialDocuments: true,\n  financialDocumentBrowserPrintPdf: true,\n  financialDocumentServerPdfGeneration: false,",1)

          system=system.replace("<title>システム確認 CAR-21｜DPRO中古車センター</title>","<title>システム確認 CAR-22｜DPRO中古車センター</title>",1)
          system=system.replace("CAR-21 営業前システム確認","CAR-22 営業前システム確認",1)
          system=system.replace("CAR-21 入出金・未収金・支払・精算管理","CAR-22 請求書・領収書・買取支払明細・精算書管理",1)
          label_marker='payment_member_visibility_guard:"会員向け入金情報ガード",admin_guard:'
          if "car22_financial_documents_schema" not in system:
              if system.count(label_marker)!=1:
                  raise SystemExit("system-checkラベル追加位置を確認できません。")
              system=system.replace(label_marker,'payment_member_visibility_guard:"会員向け入金情報ガード",car22_financial_documents_schema:"CAR-22安全DB",owner_financial_document_overview:"帳票一覧API",financial_document_issue_snapshot_lock:"発行内容固定",financial_document_reissue_history:"再発行履歴",financial_document_void_reason_guard:"無効理由必須",member_financial_documents:"マイページ発行帳票",financial_document_browser_print:"印刷・PDF保存",admin_guard:',1)

          count_marker='payment_transactions:"入出金履歴",open_tasks:"未完了タスク"'
          if 'financial_documents:"発行帳票"' not in system:
              if system.count(count_marker)!=1:
                  raise SystemExit("system-check件数追加位置を確認できません。")
              system=system.replace(count_marker,'payment_transactions:"入出金履歴",financial_documents:"発行帳票",financial_document_events:"帳票履歴",open_tasks:"未完了タスク"',1)

          if "DPRO CAR STEP CAR-22 MEMBER FINANCIAL DOCUMENTS" not in member:
              member=member.replace("</style>",member_css+"\n  </style>",1)

          nav_old='<a href="#communications">ご案内履歴</a></nav>'
          if '#financial-documents' not in member:
              if member.count(nav_old)!=1:
                  raise SystemExit("member.htmlメニュー追加位置を確認できません。")
              member=member.replace(nav_old,'<a href="#communications">ご案内履歴</a><a href="#financial-documents">発行帳票</a></nav>',1)

          communication_section='      <section class="section" id="communications"><div class="section-head"><div><p class="section-kicker">MESSAGE HISTORY</p><h2>店舗からのご案内</h2></div><p>送信済みのご案内だけを表示</p></div><div class="follow-list" id="communicationList"></div></section>'
          if 'id="financial-documents"' not in member:
              if member.count(communication_section)!=1:
                  raise SystemExit("member.html帳票セクション追加位置を確認できません。")
              member=member.replace(communication_section,communication_section+'\n      <section class="section" id="financial-documents"><div class="section-head"><div><p class="section-kicker">ISSUED DOCUMENTS</p><h2>請求書・領収書・精算書</h2></div><p>発行済み・公開許可済みの帳票だけを表示</p></div><div class="financial-document-list" id="financialDocumentList"></div></section>',1)

          render_call='renderCommunications(data.communications||[]);'
          if 'renderFinancialDocuments(data.financial_documents||[])' not in member:
              if member.count(render_call)!=1:
                  raise SystemExit("member.html描画追加位置を確認できません。")
              member=member.replace(render_call,render_call+'renderFinancialDocuments(data.financial_documents||[]);',1)

          if "const CAR22_MEMBER_TYPE_LABEL=" not in member:
              marker='      function renderCommunications(items){'
              if member.count(marker)!=1:
                  raise SystemExit("member.html JavaScript追加位置を確認できません。")
              member=member.replace(marker,member_js+"\n"+marker,1)

          required_owner=[new,'id="view-financials"','id:"financials"',"renderFinancials","帳票下書きを作成","再発行を記録"]
          required_member=['id="financial-documents"',"financialDocumentList","renderFinancialDocuments","表示・印刷／PDF保存"]
          for filename,text,markers in (("owner.html",owner,required_owner),("member.html",member,required_member)):
              missing=[marker for marker in markers if marker not in text]
              if missing:
                  raise SystemExit(f"{filename}検査失敗: {missing}")
          if new not in config:
              raise SystemExit("config.js更新失敗")
          if "car22_financial_documents_schema" not in system:
              raise SystemExit("system-check更新失敗")

          OWNER.write_text(owner,encoding="utf-8")
          MEMBER.write_text(member,encoding="utf-8")
          CONFIG.write_text(config,encoding="utf-8")
          SYSTEM.write_text(system,encoding="utf-8")
          print("CAR-22 frontend update: OK")
          PY

      - name: Validate CAR-22 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          requirements={
            "owner.html":["CAR-22-FINANCIAL-DOCUMENTS-PRINT-MEMBER-20260724","view-financials","renderFinancials","内容を確定して発行","再発行を記録"],
            "member.html":["financial-documents","financialDocumentList","renderFinancialDocuments"],
            "config.js":["CAR-22-FINANCIAL-DOCUMENTS-PRINT-MEMBER-20260724","ownerFinancialDocuments","memberFinancialDocuments","financialDocumentServerPdfGeneration: false"],
            "system-check.html":["CAR-22","car22_financial_documents_schema","financial_document_issue_snapshot_lock","financial_documents"],
          }
          for filename,markers in requirements.items():
              text=Path(filename).read_text(encoding="utf-8")
              missing=[marker for marker in markers if marker not in text]
              if missing:
                  raise SystemExit(f"{filename}検査失敗: {missing}")

          for filename,temp in (("owner.html","/tmp/car22-owner.js"),("member.html","/tmp/car22-member.js"),("system-check.html","/tmp/car22-system.js")):
              text=Path(filename).read_text(encoding="utf-8")
              scripts=[value for value in re.findall(r"<script(?:\s+[^>]*)?>(.*?)</script>",text,flags=re.S) if value.strip()]
              if not scripts:
                  raise SystemExit(f"{filename} JavaScript抽出失敗")
              Path(temp).write_text(scripts[-1],encoding="utf-8")

          for filename in ("owner.html","member.html"):
              text=Path(filename).read_text(encoding="utf-8")
              ids=re.findall(r'\bid="([^"]+)"',text)
              duplicates=sorted({value for value in ids if ids.count(value)>1})
              if duplicates:
                  raise SystemExit(f"{filename}重複ID: {duplicates}")

          print("CAR-22 frontend validation: OK")
          PY
          node --check /tmp/car22-owner.js
          node --check /tmp/car22-member.js
          node --check /tmp/car22-system.js
          node --check config.js

      - name: Normalize and inspect
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("owner.html","member.html","config.js","system-check.html"):
              path=Path(filename)
              text=path.read_text(encoding="utf-8")
              path.write_text("\n".join(line.rstrip(" \t") for line in text.splitlines())+"\n",encoding="utf-8")
          PY
          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-22 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"
          git add owner.html member.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-22-financial-documents.yml
          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi
          git commit -m "CAR-22: add financial document management"
          git push origin main
