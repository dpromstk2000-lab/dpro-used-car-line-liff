name: DPRO CAR STEP CAR-21 R1 Payment Cashflow

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-21-payment-cashflow.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-21
  cancel-in-progress: false

jobs:
  update-payment-cashflow:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-21 Worker and SQL
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          url="https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          request=urllib.request.Request(
              url,
              headers={
                  "Accept":"application/json",
                  "User-Agent":"Mozilla/5.0",
                  "Origin":"https://dpromstk2000-lab.github.io",
              },
          )
          try:
              with urllib.request.urlopen(request,timeout=25) as response:
                  data=json.load(response)
          except urllib.error.HTTPError as error:
              if error.code==403:
                  print(
                      "::warning::GitHub ActionsからWorkerへの確認だけが"
                      "HTTP 403で拒否されました。ブラウザ確認を前提に続行します。"
                  )
                  raise SystemExit(0)
              raise

          expected="CAR-21-WORKER-PAYMENT-RECEIVABLE-PAYABLE-CASHFLOW-COMPLETE-20260724"
          if data.get("version")!=expected:
              raise SystemExit(
                  f"WorkerがCAR-21ではありません: {data.get('version')}"
              )
          checks=data.get("checks") or {}
          required=[
              "car21_payment_cashflow_schema",
              "owner_payment_overview_api_ready",
              "owner_payment_create_api_ready",
              "payment_completion_idempotency_ready",
              "payment_cancellation_guard_ready",
              "payment_member_visibility_guard_ready",
              "admin_guard",
          ]
          failed=[key for key in required if checks.get(key) is not True]
          if failed:
              raise SystemExit(f"CAR-21 Worker/SQL確認失敗: {failed}")
          print("CAR-21 Worker/SQL: OK")
          PY

      - name: Apply CAR-21 frontend update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          OWNER=Path("owner.html")
          CONFIG=Path("config.js")
          SYSTEM=Path("system-check.html")
          OLD_VERSION="CAR-20-COMMUNICATION-TEMPLATES-HISTORY-20260723"
          VERSION="CAR-21-PAYMENT-RECEIVABLE-PAYABLE-CASHFLOW-20260724"

          for path in (OWNER,CONFIG,SYSTEM):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")

          owner=OWNER.read_text(encoding="utf-8")
          config=CONFIG.read_text(encoding="utf-8")
          system=SYSTEM.read_text(encoding="utf-8")

          if OLD_VERSION not in owner or OLD_VERSION not in config:
              raise SystemExit("CAR-20フロントエンドを確認できません。")

          css=base64.b64decode("").decode("utf-8")
          owner_js=base64.b64decode("").decode("utf-8")

          if "DPRO CAR STEP CAR-21 PAYMENT CASHFLOW" not in owner:
              if owner.count("</style>") != 1:
                  raise SystemExit("owner.htmlのstyle終了位置を確認できません。")
              owner=owner.replace("</style>",css+"\n  </style>",1)

          view_marker='        <section class="section-view" id="view-communications" hidden></section>'
          if 'id="view-payments"' not in owner:
              if owner.count(view_marker)!=1:
                  raise SystemExit("入出金画面の追加位置を確認できません。")
              owner=owner.replace(view_marker,view_marker+'\n        <section class="section-view" id="view-payments" hidden></section>',1)

          section_marker='      {id:"communications",icon:"連",label:"連絡管理",kicker:"CUSTOMER COMMUNICATION",title:"LINE連絡・送信履歴",description:"テンプレート、送信予定、文章コピー、送信済み履歴を一元管理します。",count:()=>0},'
          section_new=section_marker+'\n      {id:"payments",icon:"払",label:"入出金",kicker:"PAYMENT & CASHFLOW",title:"入出金・未収金",description:"販売代金、買取支払、経費、返金、未収金、支払予定を管理します。",count:()=>0},'
          if 'id:"payments"' not in owner:
              if owner.count(section_marker)!=1:
                  raise SystemExit("入出金メニューの追加位置を確認できません。")
              owner=owner.replace(section_marker,section_new,1)

          render_marker='management:renderManagement,communications:renderCommunications,team:renderTeam'
          if 'payments:renderPayments' not in owner:
              if owner.count(render_marker)!=1:
                  raise SystemExit("入出金レンダラーの追加位置を確認できません。")
              owner=owner.replace(render_marker,'management:renderManagement,communications:renderCommunications,payments:renderPayments,team:renderTeam',1)

          if "const CAR21_STATUS_LABEL" not in owner:
              marker='    function renderTeam(){'
              if owner.count(marker)!=1:
                  raise SystemExit("CAR-21 JavaScript追加位置を確認できません。")
              owner=owner.replace(marker,owner_js+"\n"+marker,1)

          owner=owner.replace(OLD_VERSION,VERSION)
          owner=owner.replace(
              "<title>オーナーPC管理 CAR-20｜DPRO中古車センター</title>",
              "<title>オーナーPC管理 CAR-21｜DPRO中古車センター</title>",
              1,
          )
          owner=owner.replace(
              "買取からLINE連絡管理まで、一元管理。",
              "買取から入出金管理まで、一元管理。",
              1,
          )
          owner=owner.replace(
              "査定・在庫・商談・契約・納車・アフターケア・経営分析・連絡履歴を同じ画面で確認します。",
              "査定・在庫・商談・契約・納車・アフターケア・経営分析・連絡・入出金を同じ画面で確認します。",
              1,
          )

          config=config.replace(
              " * STEP CAR-20 LINE連絡テンプレート・送信予定・対応履歴管理",
              " * STEP CAR-21 入出金・未収金・支払・精算管理",
              1,
          )
          config=re.sub(
              r'version:\s*"[^"]+"',
              f'version: "{VERSION}"',
              config,
              count=1,
          )
          config=config.replace(
              "  communicationAutoSend: false,",
              "  communicationAutoSend: false,\n  ownerPaymentOverview: true,\n  ownerReceivableManagement: true,\n  ownerPayableManagement: true,\n  ownerCashflow: true,\n  paymentBankAutoSync: false,",
              1,
          )

          system=system.replace(
              "<title>システム確認 CAR-20｜DPRO中古車センター</title>",
              "<title>システム確認 CAR-21｜DPRO中古車センター</title>",
              1,
          )
          system=system.replace(
              "CAR-20 営業前システム確認",
              "CAR-21 営業前システム確認",
              1,
          )
          system=system.replace(
              "CAR-20 LINE連絡テンプレート・送信予定・対応履歴管理",
              "CAR-21 入出金・未収金・支払・精算管理",
              1,
          )
          label_marker='communication_internal_recipient_guard:"連絡先内部情報ガード",admin_guard:'
          label_new='communication_internal_recipient_guard:"連絡先内部情報ガード",car21_payment_cashflow_schema:"CAR-21安全DB",owner_payment_overview:"入出金一覧API",owner_payment_create:"入出金登録API",payment_completion_idempotency:"入出金完了二重記録防止",payment_cancellation_guard:"完了履歴の中止禁止",payment_member_visibility_guard:"会員向け入金情報ガード",admin_guard:'
          if "car21_payment_cashflow_schema" not in system:
              if system.count(label_marker)!=1:
                  raise SystemExit("system-checkのCAR-21ラベル追加位置を確認できません。")
              system=system.replace(label_marker,label_new,1)

          count_marker='communication_logs:"連絡履歴",open_tasks:"未完了タスク"'
          count_new='communication_logs:"連絡履歴",payment_transactions:"入出金履歴",open_tasks:"未完了タスク"'
          if 'payment_transactions:"入出金履歴"' not in system:
              if system.count(count_marker)!=1:
                  raise SystemExit("system-check件数追加位置を確認できません。")
              system=system.replace(count_marker,count_new,1)

          required_owner=[
              VERSION,
              'id="view-payments"',
              'id:"payments"',
              "renderPayments",
              "入出金・未収金",
              "完了として記録",
          ]
          missing=[value for value in required_owner if value not in owner]
          if missing:
              raise SystemExit(f"owner.html検査失敗: {missing}")
          if VERSION not in config:
              raise SystemExit("config.jsのCAR-21更新を確認できません。")
          if "car21_payment_cashflow_schema" not in system:
              raise SystemExit("system-checkのCAR-21更新を確認できません。")

          OWNER.write_text(owner,encoding="utf-8")
          CONFIG.write_text(config,encoding="utf-8")
          SYSTEM.write_text(system,encoding="utf-8")
          print("CAR-21 owner/config/system-check update: OK")
          PY

      - name: Validate CAR-21 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          owner=Path("owner.html").read_text(encoding="utf-8")
          config=Path("config.js").read_text(encoding="utf-8")
          system=Path("system-check.html").read_text(encoding="utf-8")

          owner_scripts=re.findall(r"<script>(.*?)</script>",owner,flags=re.S)
          system_scripts=[
              value for value in re.findall(
                  r"<script(?:\s+[^>]*)?>(.*?)</script>",
                  system,
                  flags=re.S,
              )
              if value.strip()
          ]
          if not owner_scripts or not system_scripts:
              raise SystemExit("JavaScript抽出に失敗しました。")

          Path("/tmp/car21-owner.js").write_text(owner_scripts[-1],encoding="utf-8")
          Path("/tmp/car21-system.js").write_text(system_scripts[-1],encoding="utf-8")

          ids=re.findall(r'\bid="([^"]+)"',owner)
          duplicates=sorted({value for value in ids if ids.count(value)>1})
          if duplicates:
              raise SystemExit(f"owner.htmlに重複IDがあります: {duplicates}")

          required={
              "owner.html":[
                  "CAR-21-PAYMENT-RECEIVABLE-PAYABLE-CASHFLOW-20260724",
                  "view-payments",
                  "renderPayments",
                  "入出金・未収金",
                  "銀行・会計ソフトとは自動連携しません",
              ],
              "config.js":[
                  "CAR-21-PAYMENT-RECEIVABLE-PAYABLE-CASHFLOW-20260724",
                  "ownerPaymentOverview",
                  "ownerCashflow",
                  "paymentBankAutoSync: false",
              ],
              "system-check.html":[
                  "CAR-21",
                  "car21_payment_cashflow_schema",
                  "owner_payment_overview",
                  "payment_completion_idempotency",
                  "payment_transactions",
              ],
          }
          for filename,markers in required.items():
              text=Path(filename).read_text(encoding="utf-8")
              missing=[marker for marker in markers if marker not in text]
              if missing:
                  raise SystemExit(f"{filename}検査失敗: {missing}")

          print("CAR-21 frontend structure: OK")
          PY

          node --check /tmp/car21-owner.js
          node --check /tmp/car21-system.js
          node --check config.js

      - name: Normalize and inspect
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("owner.html","config.js","system-check.html"):
              path=Path(filename)
              text=path.read_text(encoding="utf-8")
              path.write_text(
                  "\n".join(line.rstrip(" \t") for line in text.splitlines())+"\n",
                  encoding="utf-8",
              )
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-21 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-21-payment-cashflow.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-21: add payment cashflow management"
          git push origin main
