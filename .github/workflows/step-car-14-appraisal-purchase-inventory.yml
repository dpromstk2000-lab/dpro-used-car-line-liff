name: DPRO CAR STEP CAR-14 Appraisal Purchase Inventory Lifecycle

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-14-appraisal-purchase-inventory.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-14
  cancel-in-progress: false

jobs:
  update-appraisal-purchase-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-14 SQL and Worker deployment
        shell: bash
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          url = "https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          expected = "CAR-14-WORKER-APPRAISAL-PURCHASE-INVENTORY-LIFECYCLE-COMPLETE-20260723"
          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/150.0.0.0 Safari/537.36"
              ),
              "Accept": "application/json,text/plain,*/*",
              "Accept-Language": "ja,en-US;q=0.9,en;q=0.8",
              "Origin": "https://dpromstk2000-lab.github.io",
              "Referer": "https://dpromstk2000-lab.github.io/",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache",
          }

          data = None
          last_error = None
          for attempt in range(1, 4):
              request = urllib.request.Request(
                  f"{url}?github_actions_check={int(time.time())}",
                  headers=headers,
                  method="GET",
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      data = json.loads(body)
                      break
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  last_error = RuntimeError(
                      f"Worker確認HTTPエラー status={error.code} body={body[:500]}"
                  )
              except Exception as error:
                  last_error = error
              if attempt < 3:
                  time.sleep(3)

          if data is None:
              raise SystemExit(f"Cloudflare Workerの確認に失敗しました: {last_error}")
          actual = str(data.get("version") or "")
          if actual != expected:
              raise SystemExit(
                  f"Cloudflare WorkerがCAR-14ではありません。expected={expected} actual={actual}"
              )

          checks = data.get("checks") or {}
          required = [
              "owner_appraisal_lifecycle_api_ready",
              "owner_appraisal_to_purchase_contract_ready",
              "owner_purchase_to_inventory_ready",
              "appraisal_purchase_idempotency_ready",
              "purchase_inventory_idempotency_ready",
              "inventory_source_link_ready",
              "inventory_task_autocreate_ready",
              "car14_lifecycle_schema",
          ]
          missing = [key for key in required if checks.get(key) is not True]
          if missing:
              raise SystemExit(
                  f"CAR-14 SQLまたはWorkerの準備が完了していません: {missing}"
              )
          if data.get("configuration", {}).get("lifecycle_schema_version") != "CAR-14-LIFECYCLE-SCHEMA-20260723":
              raise SystemExit("CAR-14安全SQLのバージョンを確認できません。")

          print("CAR-14 SQL and Worker deployment: OK")
          print(f"version: {actual}")
          PY

      - name: Apply CAR-14 owner and system-check update
        shell: bash
        run: |
          echo '' | base64 --decode > /tmp/car14_frontend_patch.py
          python /tmp/car14_frontend_patch.py

      - name: Validate CAR-14 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          owner = Path("owner.html").read_text(encoding="utf-8")
          system_check = Path("system-check.html").read_text(encoding="utf-8")
          config = Path("config.js").read_text(encoding="utf-8")
          scripts = re.findall(r"<script>(.*?)</script>", owner, flags=re.S)
          if not scripts:
              raise SystemExit("owner.htmlのJavaScriptが見つかりません。")
          Path("/tmp/car14-owner.js").write_text(scripts[-1], encoding="utf-8")

          required_owner = [
              "CAR-14-APPRAISAL-PURCHASE-INVENTORY-LIFECYCLE-20260723",
              "査定→買取契約→販売在庫",
              "査定情報から買取契約を作成",
              "買取車両を販売在庫へ移行",
              "公開前の不足項目",
              "private_photo_summary",
          ]
          missing_owner = [value for value in required_owner if value not in owner]
          if missing_owner:
              raise SystemExit(f"owner.htmlの必要表示が不足しています: {missing_owner}")

          required_check = [
              "CAR-14安全SQL",
              "査定・買取・在庫ライフサイクルAPI",
              "査定→買取契約の二重実行ガード",
              "買取契約→在庫の二重実行ガード",
              "商品化タスク自動作成",
          ]
          missing_check = [value for value in required_check if value not in system_check]
          if missing_check:
              raise SystemExit(f"system-check.htmlの項目が不足しています: {missing_check}")

          if "ownerAppraisalLifecycle: true" not in config:
              raise SystemExit("config.jsのCAR-14設定が不足しています。")
          print("CAR-14 HTML structure: OK")
          PY

          node --check /tmp/car14-owner.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for filename in ("owner.html", "config.js", "system-check.html"):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              normalized = "\n".join(line.rstrip(" \t") for line in text.splitlines()) + "\n"
              path.write_text(normalized, encoding="utf-8")
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-14 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-14-appraisal-purchase-inventory.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-14: add appraisal purchase and inventory lifecycle"
          git push origin main
