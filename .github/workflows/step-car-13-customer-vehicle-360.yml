name: DPRO CAR STEP CAR-13 Customer Vehicle 360

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-13-customer-vehicle-360.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-13
  cancel-in-progress: false

jobs:
  update-customer-vehicle-360:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-13 Worker deployment
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.request

          url = "https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          expected = "CAR-13-WORKER-CUSTOMER-VEHICLE-360-COMPLETE-20260723"
          with urllib.request.urlopen(url, timeout=30) as response:
              data = json.load(response)

          actual = str(data.get("version") or "")
          if actual != expected:
              raise SystemExit(
                  f"Cloudflare WorkerがCAR-13ではありません。expected={expected} actual={actual}"
              )

          checks = data.get("checks") or {}
          required = [
              "owner_customer_360_api_ready",
              "owner_customer_update_api_ready",
              "owner_customer_vehicle_update_api_ready",
              "owner_customer_duplicate_guard_ready",
          ]
          missing = [key for key in required if checks.get(key) is not True]
          if missing:
              raise SystemExit(f"CAR-13 Workerの機能確認に失敗しました: {missing}")

          print("CAR-13 Worker deployment: OK")
          PY

      - name: Apply CAR-13 owner and system-check update
        shell: bash
        run: |
          echo '' | base64 --decode > /tmp/car13_patch.py
          python /tmp/car13_patch.py

      - name: Validate CAR-13 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          owner = Path("owner.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script>(.*?)</script>", owner, flags=re.S)
          if not scripts:
              raise SystemExit("owner.htmlのJavaScriptが見つかりません。")
          Path("/tmp/car13-owner-inline.js").write_text(scripts[-1], encoding="utf-8")

          required = [
              "顧客・複数車両360度管理",
              "最近のお客様",
              "360度詳細",
              "履歴タイムライン",
              "重複候補",
          ]
          missing = [item for item in required if item not in owner]
          if missing:
              raise SystemExit(f"画面構成不足: {missing}")
          print("CAR-13 HTML structure: OK")
          PY

          node --check /tmp/car13-owner-inline.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("owner.html", "config.js", "system-check.html"):
              path = Path(filename)
              lines = path.read_text(encoding="utf-8").splitlines()
              path.write_text("\n".join(line.rstrip(" \t") for line in lines) + "\n", encoding="utf-8")
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-13 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-13-customer-vehicle-360.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-13: add customer and multiple vehicle 360 management"
          git push origin main
