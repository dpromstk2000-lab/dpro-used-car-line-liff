name: DPRO CAR STEP CAR-18 R1 Actions 403 Fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-18-r1-actions-403-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-18-r1
  cancel-in-progress: false

jobs:
  update-aftercare-maintenance-retention:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-18 Worker and SQL
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          url = "https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/json",
                  "User-Agent": (
                      "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                      "AppleWebKit/537.36 Chrome/150.0 Safari/537.36"
                  ),
                  "Origin": "https://dpromstk2000-lab.github.io",
                  "Referer": (
                      "https://dpromstk2000-lab.github.io/"
                      "dpro-used-car-line-liff/"
                  ),
              },
          )

          try:
              with urllib.request.urlopen(request, timeout=25) as response:
                  data = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 403:
                  print(
                      "::warning::GitHub ActionsからWorkerへの確認だけが"
                      "HTTP 403で拒否されました。"
                  )
                  print(
                      "::warning::CAR-18 WorkerとSQLは事前にブラウザで"
                      "確認済みとして、フロント更新を続行します。"
                  )
                  raise SystemExit(0)
              raise

          expected = (
              "CAR-18-WORKER-AFTERCARE-MAINTENANCE-RETENTION-"
              "COMPLETE-20260723"
          )
          if data.get("version") != expected:
              raise SystemExit(
                  f"WorkerがCAR-18ではありません: {data.get('version')}"
              )

          checks = data.get("checks") or {}
          required = [
              "car18_aftercare_lifecycle_schema",
              "owner_aftercare_overview_api_ready",
              "owner_aftercare_360_api_ready",
              "owner_aftercare_plan_sync_ready",
              "owner_service_record_api_ready",
              "aftercare_followup_idempotency_ready",
              "aftercare_task_idempotency_ready",
              "member_aftercare_schedule_ready",
          ]
          failed = [key for key in required if checks.get(key) is not True]
          if failed:
              raise SystemExit(f"CAR-18 Worker/SQL確認失敗: {failed}")

          print("CAR-18 Worker/SQL: OK")
          PY

      - name: Apply CAR-18 frontend update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          OWNER=Path("owner.html")
          MEMBER=Path("member.html")
          CONFIG=Path("config.js")
          SYSTEM=Path("system-check.html")
          OLD_VERSION="CAR-17-R1-CONTRACT-DELIVERY-HEADER-ALIGNMENT-20260723"
          VERSION="CAR-18-AFTERCARE-MAINTENANCE-RETENTION-20260723"
          MARKER="DPRO CAR STEP CAR-18 AFTERCARE MAINTENANCE RETENTION"

          for path in (OWNER,MEMBER,CONFIG,SYSTEM):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")

          owner=OWNER.read_text(encoding="utf-8")
          member=MEMBER.read_text(encoding="utf-8")
          if OLD_VERSION not in owner:
              raise SystemExit("CAR-17-R1 owner.htmlを確認できません。")
          if MARKER in owner:
              raise SystemExit("CAR-18は適用済みです。")

          owner_css='    /* DPRO CAR STEP CAR-18 AFTERCARE / MAINTENANCE / RETENTION */\n    .detail-drawer.aftercare-journey{width:min(820px,100%)}\n    .aftercare-hero{padding:18px;border-radius:17px;background:linear-gradient(135deg,#10243e,#215174);color:#fff}\n    .aftercare-hero h3{margin:0;font-size:26px}.aftercare-hero p{margin:3px 0 0;color:#d7e5ee}\n    .aftercare-stages{margin-top:14px;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:7px}\n    .aftercare-stage{padding:10px;border:1px solid rgba(255,255,255,.19);border-radius:12px;background:rgba(255,255,255,.08)}\n    .aftercare-stage.done{border-color:#91d4bf;background:#e9f8f2;color:#153f35}.aftercare-stage.current{border-color:#e6b95e;background:#fff5d9;color:#583e0a}\n    .aftercare-stage span,.aftercare-stage small{display:block;font-size:11px}.aftercare-stage strong{display:block;font-size:14px;line-height:1.35}\n    .aftercare-overdue{margin-top:12px;padding:10px 12px;border-radius:10px;background:#fff0ed;color:#8b2c22;font-weight:900}\n    .aftercare-summary{margin:16px 0;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}\n    .aftercare-summary article,.aftercare-card{padding:15px;border:1px solid var(--line);border-radius:14px;background:#fff}\n    .aftercare-summary span{display:block;color:var(--muted);font-size:13px;font-weight:800}.aftercare-summary strong{display:block;font-size:27px}\n    .aftercare-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.aftercare-card.warn{border-color:#e2b35a;background:#fffaf0}.aftercare-card.danger{border-color:#dfa39b;background:#fff5f3}\n    .aftercare-card h3{margin:0;font-size:20px}.aftercare-card p{margin:3px 0;color:var(--muted)}\n    .aftercare-card-meta{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:7px}.aftercare-card-meta div{padding:9px 10px;border-radius:9px;background:var(--soft)}.aftercare-card-meta span{display:block;color:var(--muted);font-size:11px;font-weight:800}.aftercare-card-meta strong{display:block}\n    .aftercare-open{width:100%;margin-top:12px;border-color:#d9a63e;background:#fff8e7}\n    .aftercare-section{margin-top:15px;padding:16px;border:1px solid var(--line);border-radius:15px;background:#fff}.aftercare-section h3{margin:0 0 10px;font-size:20px}\n    .aftercare-form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.aftercare-field{display:grid;gap:5px}.aftercare-field.full{grid-column:1/-1}.aftercare-field label{font-size:13px;font-weight:900}.aftercare-field input,.aftercare-field select,.aftercare-field textarea{width:100%;min-height:48px;padding:9px 11px;border:1px solid #b9c6d0;border-radius:10px;background:#fff;color:var(--ink)}.aftercare-field textarea{min-height:88px;resize:vertical}\n    .aftercare-actions{grid-column:1/-1;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}.aftercare-actions .button{min-width:190px}\n    .aftercare-list{display:grid;gap:8px}.aftercare-row{padding:11px 12px;border-radius:11px;background:var(--soft);display:grid;grid-template-columns:minmax(0,1fr) minmax(190px,auto);gap:8px;align-items:center}.aftercare-row strong{display:block}.aftercare-row span{display:block;color:var(--muted);font-size:13px}.aftercare-row-action{display:grid;grid-template-columns:1fr auto;gap:6px}.aftercare-row-action select{min-height:42px;padding:6px 8px;border:1px solid #bdc9d2;border-radius:9px;background:#fff}\n    .aftercare-ready{padding:12px 14px;border-radius:11px;background:#e9f8f2;color:#12614b;font-weight:850}.aftercare-warning{padding:12px 14px;border-left:5px solid var(--amber);border-radius:0 11px 11px 0;background:#fff7e5;color:#68490e}\n    @media(max-width:900px){.aftercare-stages{grid-template-columns:repeat(2,1fr)}.aftercare-summary{grid-template-columns:1fr 1fr}.aftercare-grid{grid-template-columns:1fr}}\n    @media(max-width:650px){.detail-drawer.aftercare-journey{height:min(94dvh,980px)}.aftercare-stages,.aftercare-form-grid{grid-template-columns:1fr}.aftercare-field.full,.aftercare-actions{grid-column:auto}.aftercare-row{grid-template-columns:1fr}.aftercare-actions .button{width:100%;min-width:0}}\n'
          owner_js='    const CAR18_FOLLOWUP_LABELS={after_delivery:"納車後7日確認",inspection:"1か月点検",vehicle_inspection:"車検期限前案内",warranty:"保証期限確認",oil_change:"オイル交換",replacement:"乗り換え相談"};\n    const CAR18_SERVICE_LABELS={after_delivery_check:"納車後確認",initial_inspection:"1か月点検",periodic_inspection:"定期点検",vehicle_inspection:"車検",oil_change:"オイル交換",warranty:"保証対応",repair:"修理",recall:"リコール",other:"その他"};\n    const CAR18_SERVICE_STATUS_LABELS={planned:"予定",reserved:"予約済み",in_progress:"対応中",completed:"完了",cancelled:"キャンセル"};\n    const CAR18_INTEREST_LABELS={none:"見込みなし",low:"低",medium:"中",high:"高"};\n    const aftercareLocalDateTime=value=>salesLocalDateTime(value);\n    function aftercareDateValue(value){return value||""}\n    function aftercareButton(contractId,labelText="愛車サポート360度"){\n      const button=el("button","button aftercare-open",labelText);button.type="button";button.addEventListener("click",()=>openAftercareJourney(contractId));return button\n    }\n    async function openAftercareJourney(contractId){\n      const drawer=document.getElementById("detailDrawer"),overlay=document.getElementById("detailOverlay"),body=document.getElementById("detailBody");\n      drawer.classList.remove("customer-360","vehicle-lifecycle","sales-journey","delivery-journey","aftercare-journey");drawer.classList.add("aftercare-journey");\n      document.getElementById("detailTitle").textContent="納車後・点検・車検・乗り換え360度";\n      document.getElementById("detailSubtitle").textContent="フォロー予定、保証、点検、整備履歴、次回提案を一体管理";\n      clear(body);body.append(el("div","customer360-loading","愛車サポート情報を取得しています…"));overlay.hidden=false;drawer.hidden=false;\n      requestAnimationFrame(()=>{overlay.classList.add("open");drawer.classList.add("open")});document.body.style.overflow="hidden";\n      try{const data=await api(`/api/admin/aftercare/${encodeURIComponent(contractId)}/360`);renderAftercareJourney(body,data)}catch(error){clear(body);body.append(empty(error.message));showToast(error.message,true)}\n    }\n    function aftercareStage(number,title,done,current,paused=false){const card=el("article",`aftercare-stage${done?" done":""}${current?" current":""}`);card.append(el("span","",number),el("strong","",title),el("small","",done?"完了・確認済み":paused?"納車後に開始":current?"次に対応":"待機中"));return card}\n    function renderAftercare(){\n      const root=document.getElementById("view-aftercare");clear(root);root.append(sectionHeader("納車後フォロー・点検・車検","保証、整備履歴、次回連絡、乗り換え見込みを車両単位で管理",0),el("div","empty","愛車サポート情報を取得しています…"));\n      api("/api/admin/aftercare").then(data=>renderAftercareOverview(root,data)).catch(error=>{clear(root);root.append(empty(error.message));showToast(error.message,true)})\n    }\n    function renderAftercareOverview(root,data){\n      clear(root);const summary=data.summary||{};root.append(sectionHeader("納車後フォロー・点検・車検","保証、整備履歴、次回連絡、乗り換え見込みを車両単位で管理",summary.profiles||0));\n      const metrics=el("div","aftercare-summary");[["管理車両",summary.profiles||0],["期限超過フォロー",summary.overdue_followups||0],["60日以内の点検・車検",summary.inspection_due_60||0],["乗り換え見込み",summary.replacement_prospects||0]].forEach(([text,value])=>{const card=el("article");card.append(el("span","",text),el("strong","",String(value)));metrics.append(card)});root.append(metrics);\n      const grid=el("div","aftercare-grid");(data.items||[]).forEach(item=>{const p=item.profile||{},contract=item.contract||{},customer=item.customer||{},vehicle=item.inventory||{},kind=item.overdue_followups?" danger":item.open_followups?" warn":"",card=el("article",`aftercare-card${kind}`);card.append(el("h3","",vehicleName(vehicle)),el("p","",`${customer.customer_name||"顧客未設定"}／${contract.contract_number||"契約番号未設定"}`));const metaRoot=el("div","aftercare-card-meta");[["状況",p.status==="active"?"サポート中":p.status==="paused"?"納車待ち":"完了"],["次回連絡",p.next_contact_at?dateTime(p.next_contact_at):"未設定"],["点検",p.next_inspection_date?date(p.next_inspection_date):"未設定"],["車検",p.next_vehicle_inspection_date?date(p.next_vehicle_inspection_date):"未設定"],["走行距離",`${Number(p.current_mileage_km||0).toLocaleString("ja-JP")}km`],["乗り換え",CAR18_INTEREST_LABELS[p.replacement_interest]||p.replacement_interest]].forEach(([key,value])=>{const box=el("div");box.append(el("span","",key),el("strong","",value));metaRoot.append(box)});card.append(metaRoot,aftercareButton(contract.id,p.status==="paused"?"納車後サポート準備を確認":"愛車サポート360度を開く"));grid.append(card)});if(!grid.children.length)grid.append(empty("販売契約が登録されると、納車後サポート準備が表示されます。"));root.append(grid)\n    }\n    function renderAftercareJourney(root,data){\n      clear(root);const c=data.contract||{},p=data.profile||{},customer=data.customer||{},vehicle=data.inventory||{},summary=data.summary||{},followups=data.followups||[],services=data.service_records||[],delivered=c.status==="delivered";\n      const completedTypes=new Set(followups.filter(x=>["contacted","completed","skipped"].includes(x.status)).map(x=>x.followup_type));const serviceDone=new Set(services.filter(x=>x.status==="completed").map(x=>x.service_type));\n      const hero=el("section","aftercare-hero");hero.append(el("h3","",`${customer.customer_name||"顧客未設定"}／${vehicleName(vehicle)}`),el("p","",`${c.contract_number||"販売契約"}／${delivered?"納車済み":"納車前準備"}`));const stages=el("div","aftercare-stages");\n      const stage1=completedTypes.has("after_delivery"),stage2=completedTypes.has("inspection")||serviceDone.has("initial_inspection"),stage3=completedTypes.has("vehicle_inspection")||serviceDone.has("vehicle_inspection")||serviceDone.has("periodic_inspection"),stage4=completedTypes.has("warranty")||serviceDone.has("warranty"),stage5=["medium","high"].includes(p.replacement_interest);\n      const current=!delivered?"":!stage1?"one":!stage2?"two":!stage3?"three":!stage4&&p.warranty_expiry?"four":"five";\n      stages.append(aftercareStage("01","納車後確認",stage1,current==="one",!delivered),aftercareStage("02","1か月点検",stage2,current==="two",!delivered),aftercareStage("03","点検・車検",stage3,current==="three",!delivered),aftercareStage("04","保証・整備",stage4,current==="four",!delivered),aftercareStage("05","乗り換え",stage5,current==="five",!delivered));hero.append(stages);if(summary.overdue_followups)hero.append(el("div","aftercare-overdue",`期限超過のフォローが${summary.overdue_followups}件あります。`));root.append(hero);\n      const info=el("section","aftercare-section");info.append(el("h3","","お客様・愛車サポート状況"));const grid=el("div","delivery-summary-grid");[["お客様",customer.customer_name||"未設定"],["電話番号",customer.phone||"未設定"],["車両",vehicleName(vehicle)],["在庫番号",vehicle.inventory_code||"未設定"],["納車日",c.delivered_at?date(c.delivered_at):"納車前"],["現在走行距離",`${Number(p.current_mileage_km||0).toLocaleString("ja-JP")}km`],["未完了フォロー",`${summary.open_followups||0}件`],["整備履歴",`${summary.completed_services||0}件`]].forEach(([key,value])=>{const box=el("div");box.append(el("span","",key),el("strong","",String(value)));grid.append(box)});info.append(grid);root.append(info);\n      const edit=el("section","aftercare-section");edit.append(el("h3","","点検・車検・保証・次回連絡を編集"));const form=el("form","aftercare-form-grid");const field=(labelText,name,value,type="text",full=false)=>{const wrap=el("div",`aftercare-field${full?" full":""}`),labelNode=el("label","",labelText);let input;if(type==="textarea")input=document.createElement("textarea");else if(type==="select")input=document.createElement("select");else{input=document.createElement("input");input.type=type}input.name=name;if(type!=="select")input.value=value??"";wrap.append(labelNode,input);return{wrap,input}};\n      const status=field("サポート状況","status","","select");[["paused","一時停止"],["active","サポート中"],["completed","完了"]].forEach(([value,text])=>{const o=el("option","",text);o.value=value;o.selected=value===p.status;status.input.append(o)});const staff=field("担当者","assigned_staff_id","","select");const noStaff=el("option","","未設定");noStaff.value="";staff.input.append(noStaff);(data.staff||[]).forEach(item=>{const o=el("option","",item.staff_name);o.value=item.id;o.selected=item.i