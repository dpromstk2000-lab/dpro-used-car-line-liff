      - name: Validate CAR-18 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          files=["owner.html","member.html","system-check.html"]
          for filename in files:
              html=Path(filename).read_text(encoding="utf-8")
              scripts=[value for value in re.findall(r"<script(?:\s+[^>]*)?>(.*?)</script>",html,flags=re.S) if value.strip()]
              if not scripts: raise SystemExit(f"{filename}のJavaScriptが見つかりません。")
              Path(f"/tmp/car18-{filename}.js").write_text(scripts[-1],encoding="utf-8")
              ids=re.findall(r'\bid="([^"]+)"',html)
              duplicates=sorted({value for value in ids if ids.count(value)>1})
              if duplicates: raise SystemExit(f"{filename}に重複IDがあります: {duplicates}")
          required={
            "owner.html":["CAR-18-AFTERCARE-MAINTENANCE-RETENTION-20260723","view-aftercare","renderAftercare","愛車サポート360度","点検・整備履歴を登録"],
            "member.html":["DPRO CAR STEP CAR-18 AFTERCARE MAINTENANCE RETENTION","aftercareGrid","serviceList","renderAftercare","点検・車検・整備履歴"],
            "config.js":["CAR-18-AFTERCARE-MAINTENANCE-RETENTION-20260723","ownerAftercare360","memberServiceHistory"],
            "system-check.html":["CAR-18","car18_aftercare_lifecycle_schema","owner_aftercare_360","member_aftercare_schedule"],
          }
          for filename,markers in required.items():
              text=Path(filename).read_text(encoding="utf-8")
              missing=[value for value in markers if value not in text]
              if missing: raise SystemExit(f"{filename}の必須項目がありません: {missing}")
          print("CAR-18 frontend structure: OK")
          PY
          node --check /tmp/car18-owner.html.js
          node --check /tmp/car18-member.html.js
          node --check /tmp/car18-system-check.html.js
          node --check config.js

