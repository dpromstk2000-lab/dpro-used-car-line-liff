name: DPRO CAR STEP CAR-15 Public Inventory Catalog

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-15-public-inventory-catalog.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-15
  cancel-in-progress: false

jobs:
  update-public-inventory-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-15 Worker deployment
        shell: bash
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          url = "https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          expected = "CAR-15-WORKER-PUBLIC-INVENTORY-CATALOG-DETAIL-COMPLETE-20260723"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/150 Safari/537.36",
              "Accept": "application/json,text/plain,*/*",
              "Accept-Language": "ja,en-US;q=0.9,en;q=0.8",
              "Origin": "https://dpromstk2000-lab.github.io",
              "Referer": "https://dpromstk2000-lab.github.io/",
              "Cache-Control": "no-cache",
          }
          data = None
          last_error = None
          for attempt in range(1,4):
              request = urllib.request.Request(f"{url}?github_actions_check={int(time.time())}", headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      data = json.loads(response.read().decode("utf-8"))
                      break
              except Exception as error:
                  last_error = error
                  if attempt < 3:
                      time.sleep(3)
          if data is None:
              raise SystemExit(f"Worker確認に失敗しました: {last_error}")
          if data.get("version") != expected:
              raise SystemExit(f"CAR-15 Workerではありません: {data.get('version')}")
          checks = data.get("checks") or {}
          required = [
              "public_inventory_pagination_ready",
              "public_inventory_facets_ready",
              "public_inventory_server_sort_ready",
              "public_vehicle_share_ready",
              "owner_inventory_publish_readiness_ready",
              "owner_inventory_public_preview_ready",
          ]
          missing = [key for key in required if checks.get(key) is not True]
          if missing:
              raise SystemExit(f"CAR-15 Worker機能が不足しています: {missing}")
          print("CAR-15 Worker deployment: OK")
          PY

      - name: Write CAR-15 public pages
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          files = {
              'inventory.html': '',
              'vehicle.html': '',
              'vehicle-preview.html': '',
              'config.js': '',
              'system-check.html': '',
          }
          for name, content in files.items():
              Path(name).write_bytes(base64.b64decode(content))
              print(f"write: {name}")
          PY

      - name: Patch CAR-15 owner screen
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          OWNER = Path("owner.html")
          OLD_VERSION = "CAR-14-APPRAISAL-PURCHASE-INVENTORY-LIFECYCLE-20260723"
          VERSION = "CAR-15-PUBLIC-INVENTORY-CATALOG-DETAIL-20260723"

          if not OWNER.exists():
              raise SystemExit("owner.html が見つかりません。")
          owner = OWNER.read_text(encoding="utf-8")
          if OLD_VERSION not in owner:
              raise SystemExit("CAR-14完成版owner.htmlを確認できません。")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が{count}件でした。")
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label, flags=0):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が{count}件でした。")
              return updated

          css = r'''
              /* DPRO CAR STEP CAR-15 PUBLIC INVENTORY CATALOG */
              .publish-readiness{margin-bottom:17px;padding:16px;border:1px solid #e2b55b;border-radius:15px;background:#fff8e7}
              .publish-readiness.ready{border-color:#90cdbb;background:#ebf8f3}
              .publish-readiness h3{margin:0;font-size:20px}.publish-readiness p{margin:3px 0 0;color:var(--muted)}
              .publish-missing{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}.publish-missing span{padding:5px 9px;border-radius:999px;background:#fff;color:#79540e;font-size:13px;font-weight:850}
              .publish-readiness.ready .publish-missing span{color:#106047}.preview-open{width:100%;margin-top:9px;border-color:#95a9ba;background:#f7fafc}
              .modal-actions .preview-open{width:auto;margin:0;margin-right:auto}
              @media(max-width:650px){.modal-actions .preview-open{width:100%;order:-1}.modal-actions{flex-wrap:wrap}}
          '''
          owner = replace_once(owner, "  </style>", css + "\n  </style>", "CAR-15 CSS追加")

          owner = replace_once(
              owner,
              '<div class="modal-body">\n    <form id="inventoryForm">',
              '<div class="modal-body">\n    <section class="publish-readiness" id="publishReadiness"><div><h3 id="publishReadinessTitle">公開前確認</h3><p id="publishReadinessText">車両情報を取得しています。</p></div><div class="publish-missing" id="publishMissing"></div></section>\n    <form id="inventoryForm">',
              "公開前確認パネル追加",
          )
          owner = replace_once(
              owner,
              '<div class="modal-actions"><button class="button" type="button" data-close="inventoryModal">キャンセル</button><button class="button amber" type="submit">車両情報を保存</button></div></form>',
              '<div class="modal-actions"><a class="button preview-open" id="inventoryPreviewLink" href="#" target="_blank" rel="noopener" hidden>公開前プレビュー</a><button class="button" type="button" data-close="inventoryModal">キャンセル</button><button class="button amber" type="submit">車両情報を保存</button></div></form>',
              "公開前プレビュー導線追加",
          )

          render_inventory = r'''      function renderInventory(){
                  const root=document.getElementById("view-inventory");clear(root);
                  root.append(sectionHeader("販売在庫","公開準備・プレビュー・掲載写真まで管理",state.data.inventory.length));
                  const grid=el("div","record-grid");
                  state.data.inventory.forEach(x=>{
                    const cost=(x.purchase_cost||0)+(x.reconditioning_cost||0)+(x.other_cost||0),gross=x.total_price===null||x.total_price===undefined?null:x.total_price-cost;
                    const card=recordCard({title:vehicleName(x),number:x.inventory_code,resource:"inventory",item:x,items:[["年式",x.model_year?`${x.model_year}年`:"未設定"],["走行距離",x.mileage_km!==null?`${fmt.format(x.mileage_km)}km`:"未設定"],["登録番号",x.registration_number||"未設定"],["公開",x.is_public?"公開中":"非公開"],["仕入・商品化原価",money(cost),"advanced"],["概算粗利",money(gross),"advanced"]],priceTitle:"支払総額",priceValue:x.total_price,note:x.is_public?`公開URL：vehicle.html?slug=${x.public_slug||"未設定"}`:"公開前の在庫です。",attention:["incoming","inspection","reconditioning","ready_to_publish"].includes(x.status)});
                    const preview=el("a","button preview-open","公開前プレビュー");preview.href=`vehicle-preview.html?id=${encodeURIComponent(x.id)}${isDemo?"&demo=1":""}`;preview.target="_blank";preview.rel="noopener";
                    const edit=el("button","button editor-open","車両情報・掲載写真を編集");edit.type="button";edit.addEventListener("click",()=>openInventoryEditor(x.id));
                    card.append(preview,edit);grid.append(card)
                  });
                  if(!grid.children.length)grid.append(empty("販売在庫はありません。"));root.append(grid)
                }
                const inventoryModal='''
          owner = regex_once(
              owner,
              r'      function renderInventory\(\)\{.*?\n      const inventoryModal=',
              render_inventory,
              "販売在庫画面強化",
              re.S,
          )

          readiness_function = r'''      function renderPublishReadiness(readiness,previewPath){
                  const root=document.getElementById("publishReadiness"),title=document.getElementById("publishReadinessTitle"),text=document.getElementById("publishReadinessText"),missing=document.getElementById("publishMissing"),link=document.getElementById("inventoryPreviewLink");
                  const ready=readiness?.ready===true,required=Array.isArray(readiness?.missing)?readiness.missing:[],warnings=Array.isArray(readiness?.warnings)?readiness.warnings:[];
                  root.classList.toggle("ready",ready);title.textContent=ready?"公開準備が整っています":"公開前に確認が必要です";
                  text.textContent=ready?"公開前プレビューでお客様からの見え方を確認してから公開できます。":"不足項目を入力し、公開掲載写真を追加してください。";
                  missing.replaceChildren();
                  const items=required.length?required:(warnings.length?warnings:[ready?"必須項目はすべて入力済み":"公開状態を確認してください"]);
                  items.forEach(value=>missing.append(el("span","",value)));
                  if(previewPath){link.href=`${previewPath}${isDemo?"&demo=1":""}`;link.hidden=false}else{link.hidden=true}
                }
          '''
          owner = replace_once(owner, '      function renderListingPhotos', readiness_function + '      function renderListingPhotos', "公開準備表示関数追加")

          old_open = '      async function openInventoryEditor(id){try{const data=await api(`/api/admin/inventory/${encodeURIComponent(id)}`),v=data.vehicle;editingInventoryId=id;["manufacturer","car_name","grade","model_year","color","body_type","fuel_type","drive_type","mileage_km","vehicle_price","extra_cost","public_title","public_description","public_slug","is_public"].forEach(name=>fieldValue(inventoryForm,name,v[name]));fieldValue(inventoryForm,"id",id);fieldValue(inventoryForm,"feature_tags",Array.isArray(v.feature_tags)?v.feature_tags.join("、"):"");renderListingPhotos(data.photos,data.photo_limit);inventoryModal.showModal()}catch(error){showToast(error.message,true)}}'
          new_open = '      async function openInventoryEditor(id){try{const data=await api(`/api/admin/inventory/${encodeURIComponent(id)}`),v=data.vehicle;editingInventoryId=id;["manufacturer","car_name","grade","model_year","color","body_type","fuel_type","drive_type","mileage_km","vehicle_price","extra_cost","public_title","public_description","public_slug","is_public"].forEach(name=>fieldValue(inventoryForm,name,v[name]));fieldValue(inventoryForm,"id",id);fieldValue(inventoryForm,"feature_tags",Array.isArray(v.feature_tags)?v.feature_tags.join("、"):"");renderPublishReadiness(data.publish_readiness,data.preview_path);renderListingPhotos(data.photos,data.photo_limit);inventoryModal.showModal()}catch(error){showToast(error.message,true)}}'
          owner = replace_once(owner, old_open, new_open, "在庫編集時の公開準備表示")

          old_refresh = '      async function refreshInventoryEditor(){const data=await api(`/api/admin/inventory/${encodeURIComponent(editingInventoryId)}`);renderListingPhotos(data.photos,data.photo_limit)}'
          new_refresh = '      async function refreshInventoryEditor(){const data=await api(`/api/admin/inventory/${encodeURIComponent(editingInventoryId)}`);renderPublishReadiness(data.publish_readiness,data.preview_path);renderListingPhotos(data.photos,data.photo_limit)}'
          owner = replace_once(owner, old_refresh, new_refresh, "在庫編集再取得強化")

          owner = replace_once(
              owner,
              'await reloadOverview();showToast("車両情報と公開設定を保存しました。")',
              'await reloadOverview();await refreshInventoryEditor();showToast("車両情報と公開設定を保存しました。")',
              "保存後の公開準備再確認",
          )

          owner = owner.replace(OLD_VERSION, VERSION)
          owner = owner.replace('<title>オーナーPC管理 CAR-14｜DPRO中古車センター</title>','<title>オーナーPC管理 CAR-15｜DPRO中古車センター</title>',1)

          required = [
              VERSION,
              'id="publishReadiness"',
              'id="inventoryPreviewLink"',
              'function renderPublishReadiness',
              'vehicle-preview.html?id=',
              '公開準備が整っています',
              '公開前プレビュー',
          ]
          missing = [item for item in required if item not in owner]
          if missing:
              raise SystemExit(f"owner.html検査失敗: {missing}")
          if OLD_VERSION in owner:
              raise SystemExit("owner.htmlにCAR-14バージョンが残っています。")
          ids = re.findall(r'\bid="([^"]+)"', owner)
          duplicates = sorted({value for value in ids if ids.count(value)>1})
          if duplicates:
              raise SystemExit(f"owner.htmlに重複IDがあります: {duplicates}")
          OWNER.write_text(owner, encoding="utf-8")
          print("CAR-15 owner.html patch: OK")

          PY

      - name: Validate CAR-15 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          html_files = ["owner.html","inventory.html","vehicle.html","vehicle-preview.html","system-check.html"]
          required_by_file = {
              "owner.html": ["CAR-15-PUBLIC-INVENTORY-CATALOG-DETAIL-20260723","公開前プレビュー","公開準備が整っています"],
              "inventory.html": ["advancedFilters","pagination","page_size"],
              "vehicle.html": ["この車を共有","photoIndex","navigator.share"],
              "vehicle-preview.html": ["公開前プレビュー","public-preview","publish_readiness"],
              "system-check.html": ["公開在庫ページ分割","管理者用公開前プレビュー"],
          }
          for filename in html_files:
              text=Path(filename).read_text(encoding="utf-8")
              missing=[value for value in required_by_file[filename] if value not in text]
              if missing:
                  raise SystemExit(f"{filename} 必須表示不足: {missing}")
              ids=re.findall(r'\bid="([^"]+)"',text)
              duplicates=sorted({value for value in ids if ids.count(value)>1})
              if duplicates:
                  raise SystemExit(f"{filename} 重複ID: {duplicates}")
              scripts=re.findall(r'<script(?:\s+[^>]*)?>(.*?)</script>',text,flags=re.S)
              inline=[s for s in scripts if s.strip()]
              if not inline:
                  raise SystemExit(f"{filename} JavaScriptなし")
              Path(f"/tmp/{filename}.js").write_text(inline[-1],encoding="utf-8")
          print("CAR-15 HTML structure: OK")
          PY

          node --check /tmp/owner.html.js
          node --check /tmp/inventory.html.js
          node --check /tmp/vehicle.html.js
          node --check /tmp/vehicle-preview.html.js
          node --check /tmp/system-check.html.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("owner.html","inventory.html","vehicle.html","vehicle-preview.html","config.js","system-check.html"):
              path=Path(filename)
              text=path.read_text(encoding="utf-8")
              path.write_text("\n".join(line.rstrip(" \t") for line in text.splitlines())+"\n",encoding="utf-8")
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-15 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html inventory.html vehicle.html vehicle-preview.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-15-public-inventory-catalog.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-15: strengthen public inventory catalog and vehicle detail"
          git push origin main
