name: DPRO CAR STEP CAR-17 R1 Contract Header Alignment

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-17-r1-contract-header-alignment.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-17-r1
  cancel-in-progress: false

jobs:
  align-contract-delivery-header:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply CAR-17 R1 header alignment
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          OWNER = Path("owner.html")
          CONFIG = Path("config.js")

          OLD_VERSION = "CAR-17-SALE-CONTRACT-DELIVERY-LIFECYCLE-20260723"
          VERSION = "CAR-17-R1-CONTRACT-DELIVERY-HEADER-ALIGNMENT-20260723"

          for path in (OWNER, CONFIG):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")

          owner = OWNER.read_text(encoding="utf-8")
          config = CONFIG.read_text(encoding="utf-8")

          if OLD_VERSION not in owner:
              raise SystemExit("CAR-17 owner.htmlを確認できません。")
          if OLD_VERSION not in config:
              raise SystemExit("CAR-17 config.jsを確認できません。")

          old_section = '{id:"contracts",icon:"書",label:"契約・書類",kicker:"CONTRACT & DOCUMENT",title:"契約・必要書類",description:"買取契約・販売契約・必要書類をまとめて確認します。",count:d=>(d.documents||[]).filter(x=>["missing","requested","rejected"].includes(x.status)).length}'
          new_section = '{id:"contracts",icon:"書",label:"契約・書類",kicker:"CONTRACT & DELIVERY",title:"契約・入金・必要書類",description:"買取契約・販売契約・入金・登録・納車準備をまとめて確認します。",count:d=>(d.documents||[]).filter(x=>["missing","requested","rejected"].includes(x.status)).length}'

          if owner.count(old_section) != 1:
              raise SystemExit(
                  f"契約画面タイトルの置換対象が{owner.count(old_section)}件でした。安全停止します。"
              )

          owner = owner.replace(old_section, new_section, 1)
          owner = owner.replace(OLD_VERSION, VERSION)
          owner = owner.replace(
              "<title>オーナーPC管理 CAR-17｜DPRO中古車センター</title>",
              "<title>オーナーPC管理 CAR-17-R1｜DPRO中古車センター</title>",
              1,
          )

          config = config.replace(
              " * STEP CAR-17 販売契約から納車までの進行管理",
              " * STEP CAR-17-R1 契約・入金・納車画面の表示名統一",
              1,
          )
          config = re.sub(
              r'version:\s*"[^"]+"',
              f'version: "{VERSION}"',
              config,
              count=1,
          )

          required_owner = [
              VERSION,
              'kicker:"CONTRACT & DELIVERY"',
              'title:"契約・入金・必要書類"',
              'description:"買取契約・販売契約・入金・登録・納車準備をまとめて確認します。"',
              "販売契約→納車360度",
          ]
          missing = [value for value in required_owner if value not in owner]
          if missing:
              raise SystemExit(f"owner.html検査失敗: {missing}")

          if VERSION not in config:
              raise SystemExit("config.jsのバージョン更新を確認できません。")

          OWNER.write_text(owner, encoding="utf-8")
          CONFIG.write_text(config, encoding="utf-8")

          print("CAR-17-R1 契約画面表示名統一: OK")
          PY

      - name: Validate CAR-17 R1 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          owner = Path("owner.html").read_text(encoding="utf-8")
          config = Path("config.js").read_text(encoding="utf-8")

          scripts = re.findall(r"<script>(.*?)</script>", owner, flags=re.S)
          if not scripts:
              raise SystemExit("owner.htmlのJavaScriptが見つかりません。")

          Path("/tmp/car17-r1-owner.js").write_text(
              scripts[-1],
              encoding="utf-8",
          )

          ids = re.findall(r'\bid="([^"]+)"', owner)
          duplicates = sorted({value for value in ids if ids.count(value) > 1})
          if duplicates:
              raise SystemExit(f"重複IDがあります: {duplicates}")

          required = [
              "CAR-17-R1-CONTRACT-DELIVERY-HEADER-ALIGNMENT-20260723",
              "CONTRACT & DELIVERY",
              "契約・入金・必要書類",
              "入金・登録・納車準備",
              "販売契約→納車360度",
          ]
          for value in required:
              if value not in owner and value not in config:
                  raise SystemExit(f"必須表示がありません: {value}")

          print("CAR-17-R1 HTML構成検査: OK")
          PY

          node --check /tmp/car17-r1-owner.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for filename in ("owner.html", "config.js"):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              normalized = "\n".join(
                  line.rstrip(" \t") for line in text.splitlines()
              ) + "\n"
              path.write_text(normalized, encoding="utf-8")
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-17 R1 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js
          git rm --ignore-unmatch .github/workflows/step-car-17-r1-contract-header-alignment.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-17-R1: align contract and delivery screen labels"
          git push origin main
