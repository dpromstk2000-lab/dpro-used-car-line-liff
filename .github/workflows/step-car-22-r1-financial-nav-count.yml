name: DPRO CAR STEP CAR-22 R1 Financial Nav Count

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-22-r1-financial-nav-count.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-22-r1
  cancel-in-progress: false

jobs:
  update-financial-nav-count:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply CAR-22-R1 frontend fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          owner_path = Path("owner.html")
          config_path = Path("config.js")

          if not owner_path.exists() or not config_path.exists():
              raise SystemExit("owner.html または config.js が見つかりません。")

          owner = owner_path.read_text(encoding="utf-8")
          config = config_path.read_text(encoding="utf-8")

          old_version = "CAR-22-FINANCIAL-DOCUMENTS-PRINT-MEMBER-20260724"
          new_version = "CAR-22-R1-FINANCIAL-NAV-COUNT-20260724"

          if old_version not in owner or old_version not in config:
              raise SystemExit("CAR-22の現行フロントエンドを確認できません。")

          old_section = '{id:"financials",icon:"票",label:"帳票",kicker:"FINANCIAL DOCUMENTS",title:"請求書・領収書・精算書",description:"入出金・契約から帳票を作成し、発行・再発行・無効化を管理します。",count:()=>0},'
          new_section = '{id:"financials",icon:"票",label:"帳票",kicker:"FINANCIAL DOCUMENTS",title:"請求書・領収書・精算書",description:"入出金・契約から帳票を作成し、発行・再発行・無効化を管理します。",count:()=>car22Data?.documents?.length||0},'

          if old_section in owner:
              owner = owner.replace(old_section, new_section, 1)
          elif new_section not in owner:
              raise SystemExit("帳票メニュー件数の修正位置を確認できません。")

          old_load = """    async function car22Load(){
                car22Data=await api("/api/admin/financial-documents");
                return car22Data;
              }"""
          new_load = """    async function car22Load(){
                car22Data=await api("/api/admin/financial-documents");
                makeNav(document.getElementById("desktopNav"));
                makeNav(document.getElementById("mobileNav"));
                return car22Data;
              }"""

          if old_load in owner:
              owner = owner.replace(old_load, new_load, 1)
          elif new_load not in owner:
              raise SystemExit("帳票取得後のメニュー再描画位置を確認できません。")

          owner = owner.replace(old_version, new_version)
          config = config.replace(old_version, new_version)

          required_owner = [
              new_version,
              'count:()=>car22Data?.documents?.length||0',
              'makeNav(document.getElementById("desktopNav"));',
              'makeNav(document.getElementById("mobileNav"));',
          ]
          missing = [marker for marker in required_owner if marker not in owner]
          if missing:
              raise SystemExit(f"owner.html検査失敗: {missing}")

          if new_version not in config:
              raise SystemExit("config.jsのバージョン更新を確認できません。")

          owner_path.write_text(owner, encoding="utf-8")
          config_path.write_text(config, encoding="utf-8")

          print("CAR-22-R1 帳票メニュー件数同期: OK")
          PY

      - name: Validate CAR-22-R1 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          owner = Path("owner.html").read_text(encoding="utf-8")
          config = Path("config.js").read_text(encoding="utf-8")

          required = [
              "CAR-22-R1-FINANCIAL-NAV-COUNT-20260724",
              'count:()=>car22Data?.documents?.length||0',
              'makeNav(document.getElementById("desktopNav"));',
              'makeNav(document.getElementById("mobileNav"));',
              'renderFinancials',
              'view-financials',
          ]
          missing = [marker for marker in required if marker not in owner]
          if missing:
              raise SystemExit(f"owner.html検査失敗: {missing}")

          if "CAR-22-R1-FINANCIAL-NAV-COUNT-20260724" not in config:
              raise SystemExit("config.js検査失敗")

          scripts = [
              value
              for value in re.findall(
                  r"<script(?:\s+[^>]*)?>(.*?)</script>",
                  owner,
                  flags=re.S,
              )
              if value.strip()
          ]
          if not scripts:
              raise SystemExit("owner.htmlのJavaScript抽出に失敗しました。")

          Path("/tmp/car22-r1-owner.js").write_text(
              scripts[-1],
              encoding="utf-8",
          )

          ids = re.findall(r'\bid="([^"]+)"', owner)
          duplicates = sorted({value for value in ids if ids.count(value) > 1})
          if duplicates:
              raise SystemExit(f"owner.htmlに重複IDがあります: {duplicates}")

          print("CAR-22-R1 frontend validation: OK")
          PY
          node --check /tmp/car22-r1-owner.js
          node --check config.js
          git diff --check

      - name: Commit CAR-22-R1 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"
          git add owner.html config.js
          git rm --ignore-unmatch .github/workflows/step-car-22-r1-financial-nav-count.yml
          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi
          git commit -m "CAR-22-R1: sync financial document nav count"
          git push origin main
