name: DPRO CAR STEP CAR-16 Sales Test Drive Purchase Journey

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-16-sales-purchase-journey.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-16
  cancel-in-progress: false

jobs:
  update-sales-purchase-journey:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-16 SQL and Worker deployment
        shell: bash
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          url = "https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          expected = "CAR-16-WORKER-SALES-TESTDRIVE-PURCHASE-JOURNEY-COMPLETE-20260723"
          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/150.0.0.0 Safari/537.36"
              ),
              "Accept": "application/json,text/plain,*/*",
              "Accept-Language": "ja,en-US;q=0.9,en;q=0.8",
              "Origin": "https://dpromstk2000-lab.github.io",
              "Referer": "https://dpromstk2000-lab.github.io/",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache",
          }

          data = None
          last_error = None
          for attempt in range(1, 4):
              request = urllib.request.Request(
                  f"{url}?github_actions_check={int(time.time())}",
                  headers=headers,
                  method="GET",
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      data = json.loads(body)
                      break
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  last_error = RuntimeError(
                      f"Worker確認HTTPエラー status={error.code} body={body[:500]}"
                  )
              except Exception as error:
                  last_error = error
              if attempt < 3:
                  time.sleep(3)

          if data is None:
              raise SystemExit(f"Cloudflare Workerの確認に失敗しました: {last_error}")
          if data.get("version") != expected:
              raise SystemExit(
                  f"Cloudflare WorkerがCAR-16ではありません。expected={expected} actual={data.get('version')}"
              )

          required = [
              "owner_sales_lead_360_api_ready",
              "owner_sales_lead_update_api_ready",
              "owner_sales_contract_autocreate_ready",
              "sales_lead_next_action_task_ready",
              "sales_contract_idempotency_ready",
              "sales_lost_reason_guard_ready",
              "car16_sales_journey_schema",
          ]
          checks = data.get("checks") or {}
          missing = [key for key in required if checks.get(key) is not True]
          if missing:
              raise SystemExit(
                  f"CAR-16 SQLまたはWorkerの機能確認に失敗しました: {missing}"
              )
          schema = (data.get("configuration") or {}).get("sales_journey_schema_version")
          if schema != "CAR-16-SALES-JOURNEY-SCHEMA-20260723":
              raise SystemExit(f"CAR-16安全SQLを確認できません。actual={schema}")

          print("CAR-16 SQL and Worker deployment: OK")
          print(f"version: {data.get('version')}")
          print(f"schema: {schema}")
          PY

      - name: Apply CAR-16 owner and system-check update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          OWNER = Path("owner.html")
          CONFIG = Path("config.js")
          SYSTEM = Path("system-check.html")
          OLD_VERSION = "CAR-15-PUBLIC-INVENTORY-CATALOG-DETAIL-20260723"
          VERSION = "CAR-16-SALES-TESTDRIVE-PURCHASE-JOURNEY-20260723"

          for path in (OWNER, CONFIG, SYSTEM):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")

          owner = OWNER.read_text(encoding="utf-8")
          if OLD_VERSION not in owner:
              raise SystemExit("CAR-15完成版owner.htmlを確認できません。")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が{count}件でした。")
              return text.replace(old, new, 1)

          css = '\n    /* DPRO CAR STEP CAR-16 SALES / TEST DRIVE / PURCHASE JOURNEY */\n    .detail-drawer.sales-journey{width:min(900px,100%)}\n    .sales-hero{padding:18px;border-radius:17px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff}\n    .sales-hero h3{margin:0;font-size:26px}.sales-hero p{margin:3px 0 0;color:#d5e1eb}\n    .sales-stages{margin-top:14px;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:7px}\n    .sales-stage{padding:11px;border:1px solid rgba(255,255,255,.18);border-radius:12px;background:rgba(255,255,255,.08)}\n    .sales-stage.done{border-color:#8fd0bb;background:#eaf7f2;color:var(--ink)}.sales-stage.current{border-color:#f0be5a;background:#fff6df;color:var(--ink)}\n    .sales-stage span{display:block;font-size:11px;font-weight:900;opacity:.8}.sales-stage strong{display:block;font-size:15px}.sales-stage small{display:block;font-size:11px;opacity:.75}\n    .sales-overdue{margin-top:12px;padding:11px 13px;border-left:5px solid var(--red);border-radius:0 10px 10px 0;background:#fff0ed;color:#8d2b22;font-weight:850}\n    .sales-section{margin-top:15px;padding:17px;border:1px solid var(--line);border-radius:15px;background:#fff}.sales-section h3{margin:0 0 11px;font-size:20px}\n    .sales-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.sales-summary-grid div{padding:10px 12px;border-radius:10px;background:var(--soft)}\n    .sales-summary-grid span{display:block;color:var(--muted);font-size:12px;font-weight:800}.sales-summary-grid strong{display:block;overflow-wrap:anywhere}\n    .sales-form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.sales-field{display:grid;gap:5px}.sales-field.full{grid-column:1/-1}.sales-field label{font-size:13px;font-weight:900}\n    .sales-field input,.sales-field select,.sales-field textarea{width:100%;min-height:48px;padding:9px 11px;border:1px solid #b9c6d0;border-radius:10px;background:#fff;color:var(--ink)}.sales-field textarea{min-height:92px;resize:vertical}\n    .sales-options{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:8px}.sales-option{min-height:45px;padding:8px 12px;display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;background:var(--soft);font-weight:800}.sales-option input{width:20px;height:20px;accent-color:var(--navy)}\n    .sales-form-actions{grid-column:1/-1;display:flex;justify-content:flex-end;gap:8px}.sales-form-actions .button{min-width:220px}\n    .sales-reservation-list,.sales-task-list,.sales-timeline{display:grid;gap:8px}.sales-reservation,.sales-task,.sales-timeline-item{padding:11px 12px;border-radius:11px;background:var(--soft)}\n    .sales-reservation{display:grid;grid-template-columns:minmax(0,1fr) minmax(170px,auto);gap:9px;align-items:center}.sales-reservation strong,.sales-task strong,.sales-timeline-item strong{display:block}.sales-reservation span,.sales-task span,.sales-timeline-item span{display:block;color:var(--muted);font-size:13px}\n    .sales-reservation-action{display:grid;grid-template-columns:1fr auto;gap:6px}.sales-reservation-action select{min-height:42px;padding:6px 8px;border:1px solid #bdc9d2;border-radius:9px;background:#fff}\n    .sales-contract-box{padding:14px;border:1px solid #e3bd71;border-radius:13px;background:#fff8e7}.sales-contract-box p{margin:4px 0;color:var(--muted)}.sales-contract-box .button{width:100%;margin-top:10px}\n    .sales-warning{padding:12px 14px;border-left:5px solid var(--amber);border-radius:0 11px 11px 0;background:#fff7e5;color:#68490e}\n    .sales-open{width:100%;margin-top:10px;border-color:#d7a43d;background:#fff8e6}\n    .sales-pipeline-summary{margin-bottom:17px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.sales-pipeline-metric{padding:15px;border:1px solid var(--line);border-radius:14px;background:#fff}.sales-pipeline-metric.warn{border-color:#e4bb69;background:#fffaf0}.sales-pipeline-metric.danger{border-color:#dfa9a2;background:#fff4f2}.sales-pipeline-metric span{display:block;color:var(--muted);font-size:13px;font-weight:800}.sales-pipeline-metric strong{display:block;font-size:28px}\n    @media(max-width:900px){.sales-stages{grid-template-columns:repeat(2,1fr)}.sales-summary-grid{grid-template-columns:1fr 1fr}.sales-pipeline-summary{grid-template-columns:1fr 1fr}}\n    @media(max-width:650px){.detail-drawer.sales-journey{height:min(94dvh,980px)}.sales-stages,.sales-summary-grid,.sales-form-grid{grid-template-columns:1fr}.sales-field.full,.sales-options,.sales-form-actions{grid-column:auto}.sales-reservation{grid-template-columns:1fr}.sales-pipeline-summary{grid-template-columns:1fr 1fr}.sales-form-actions .button{width:100%;min-width:0}}\n'
          functions = '\n    function salesLocalDateTime(value){\n      if(!value)return"";\n      const date=new Date(value);if(Number.isNaN(date.getTime()))return"";\n      const local=new Date(date.getTime()-date.getTimezoneOffset()*60000);\n      return local.toISOString().slice(0,16)\n    }\n    function salesNumber(value){return value===null||value===undefined||value===""?null:Number(value)}\n    function salesJourneyButton(leadId,labelText="商談360度を開く"){\n      const button=el("button","button sales-open",labelText);button.type="button";\n      button.addEventListener("click",()=>openSalesJourney(leadId));return button\n    }\n    async function openSalesJourney(leadId){\n      const drawer=document.getElementById("detailDrawer"),overlay=document.getElementById("detailOverlay"),body=document.getElementById("detailBody");\n      drawer.classList.remove("customer-360","vehicle-lifecycle");drawer.classList.add("sales-journey");\n      document.getElementById("detailTitle").textContent="商談・試乗・購入検討360度";\n      document.getElementById("detailSubtitle").textContent="問合せから試乗、見積、ローン、下取り、購入判断まで一体管理";\n      clear(body);body.append(el("div","customer360-loading","商談情報を取得しています…"));overlay.hidden=false;drawer.hidden=false;\n      requestAnimationFrame(()=>{overlay.classList.add("open");drawer.classList.add("open")});document.body.style.overflow="hidden";\n      try{const data=await api(`/api/admin/sales-leads/${encodeURIComponent(leadId)}/360`);renderSalesJourney(body,data)}\n      catch(error){clear(body);body.append(empty(error.message));showToast(error.message,true)}\n    }\n    function renderSalesJourney(root,data){\n      clear(root);const lead=data.lead,customer=data.customer||{},inventory=data.inventory||{},ready=data.readiness||{},summary=data.summary||{};\n      const hero=el("section","sales-hero");hero.append(el("h3","",`${customer.customer_name||"顧客未設定"}／${vehicleName(inventory)}`),el("p","",`${lead.lead_number}／${typeLabels.source[lead.source]||lead.source||