.financing_requested],["test_drive_requested","試乗希望",lead.test_drive_requested],["trade_in_requested","下取り相談",lead.trade_in_requested]].forEach(([name,textValue,checked])=>{const labelNode=el("label","sales-option"),input=document.createElement("input");input.type="checkbox";input.name=name;input.checked=Boolean(checked);labelNode.append(input,document.createTextNode(textValue));options.append(labelNode)});\n      const actions=el("div","sales-form-actions"),touch=el("button","button","連絡済みとして現在時刻を記録"),save=el("button","button amber","商談内容を保存");touch.type="button";save.type="submit";actions.append(touch,save);\n      form.append(statusField.wrap,staffField.wrap,budgetMin.wrap,budgetMax.wrap,estimate.wrap,nextAction.wrap,lastContact.wrap,options,publicNote.wrap,internalNote.wrap,lostReason.wrap,actions);editSection.append(form);root.append(editSection);\n      let touchContact=false;touch.addEventListener("click",()=>{touchContact=true;lastContact.input.value=salesLocalDateTime(new Date());showToast("保存時に最終連絡日時を更新します。");});\n      form.addEventListener("submit",async event=>{event.preventDefault();save.disabled=true;const fd=new FormData(form),iso=value=>value?new Date(value).toISOString():null;try{const result=await api(`/api/admin/sales-leads/${encodeURIComponent(lead.id)}`,{method:"PATCH",body:JSON.stringify({status:fd.get("status"),assigned_staff_id:fd.get("assigned_staff_id")||null,budget_min:salesNumber(fd.get("budget_min")),budget_max:salesNumber(fd.get("budget_max")),estimate_total:salesNumber(fd.get("estimate_total")),financing_requested:fd.get("financing_requested")==="on",test_drive_requested:fd.get("test_drive_requested")==="on",trade_in_requested:fd.get("trade_in_requested")==="on",next_action_at:iso(fd.get("next_action_at")),last_contact_at:iso(fd.get("last_contact_at")),touch_contact:touchContact,public_note:fd.get("public_note"),internal_note:fd.get("internal_note"),lost_reason:fd.get("lost_reason")})});touchContact=false;showToast(result.message||"商談