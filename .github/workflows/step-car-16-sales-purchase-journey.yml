      - name: Validate CAR-16 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          targets = {
              "owner": Path("owner.html"),
              "system": Path("system-check.html"),
          }
          for key, path in targets.items():
              text = path.read_text(encoding="utf-8")
              scripts = [
                  value for value in re.findall(
                      r"<script(?:\s+[^>]*)?>(.*?)</script>",
                      text,
                      flags=re.S,
                  ) if value.strip()
              ]
              if not scripts:
                  raise SystemExit(f"{path.name}のJavaScriptが見つかりません。")
              Path(f"/tmp/car16-{key}.js").write_text(
                  scripts[-1],
                  encoding="utf-8",
              )

          owner = Path("owner.html").read_text(encoding="utf-8")
          required = [
              "進行中商談",
              "今後の試乗",
              "見積・ローン中",
              "商談360度を開く",
              "来店・試乗予約",
              "購入判断・販売契約",
              "商談タイムライン",
          ]
          missing = [value for value in required if value not in owner]
          if missing:
              raise SystemExit(f"CAR-16必要表示が不足しています: {missing}")
          print("CAR-16 HTML structure: OK")
          PY

          node --check /tmp/car16-owner.js
          node --check /tmp/car16-system.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for filename in ("owner.html", "config.js", "system-check.html"):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              normalized = "\n".join(
                  line.rstrip(" \t") for line in text.splitlines()
              ) + "\n"
              path.write_text(normalized, encoding="utf-8")
              print(f"{filename}: 行末空白を除去しました。")
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-16 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-16-sales-purchase-journey.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-16: unify sales test drive and purchase journey"
          git push origin main
