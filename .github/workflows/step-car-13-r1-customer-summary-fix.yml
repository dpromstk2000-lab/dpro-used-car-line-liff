name: DPRO CAR STEP CAR-13 R1 Customer Summary Fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-13-r1-customer-summary-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-13-r1
  cancel-in-progress: false

jobs:
  fix-customer-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply CAR-13 R1 summary fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          OWNER = Path("owner.html")
          CONFIG = Path("config.js")
          OLD_VERSION = "CAR-13-CUSTOMER-VEHICLE-360-20260723"
          VERSION = "CAR-13-R1-CUSTOMER-SUMMARY-FIX-20260723"

          for path in (OWNER, CONFIG):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")

          owner = OWNER.read_text(encoding="utf-8")
          config = CONFIG.read_text(encoding="utf-8")

          if OLD_VERSION not in owner:
              raise SystemExit("CAR-13完成版owner.htmlを確認できません。")
          if OLD_VERSION not in config:
              raise SystemExit("CAR-13完成版config.jsを確認できません。")

          old_summary = (
              '[["現在車両",summary.owned_vehicles||0],'
              '["査定中",summary.active_appraisals||0],'
              '["購入車",summary.purchased_vehicles||0],'
              '["要対応",Number(summary.pending_documents||0)+Number(summary.open_tasks||0)]]'
          )
          new_summary = (
              '[["登録車両",summary.customer_vehicles||0],'
              '["進行中査定",summary.active_appraisals||0],'
              '["購入車",summary.purchased_vehicles||0],'
              '["要対応",Number(summary.pending_documents||0)+Number(summary.open_tasks||0)]]'
          )

          if owner.count(old_summary) != 1:
              raise SystemExit(
                  f"顧客360度サマリーの置換対象が{owner.count(old_summary)}件でした。"
              )

          owner = owner.replace(old_summary, new_summary, 1)
          owner = owner.replace(OLD_VERSION, VERSION)
          owner = owner.replace(
              '<title>オーナーPC管理 CAR-12｜DPRO中古車センター</title>',
              '<title>オーナーPC管理 CAR-13-R1｜DPRO中古車センター</title>',
              1,
          )

          config = config.replace(
              " * STEP CAR-13 顧客・複数車両360度共通設定",
              " * STEP CAR-13-R1 顧客サマリー表示修正",
              1,
          )
          config = re.sub(
              r'version:\s*"[^"]+"',
              f'version: "{VERSION}"',
              config,
              count=1,
          )

          required = [
              VERSION,
              '["登録車両",summary.customer_vehicles||0]',
              '["進行中査定",summary.active_appraisals||0]',
              "お客様の車（",
              "履歴タイムライン（",
          ]
          missing = [value for value in required if value not in owner]
          if missing:
              raise SystemExit(f"owner.html検査失敗: {missing}")

          if '["現在車両",summary.owned_vehicles||0]' in owner:
              raise SystemExit("旧サマリー表示が残っています。")

          ids = re.findall(r'\bid="([^"]+)"', owner)
          duplicate_ids = sorted({item for item in ids if ids.count(item) > 1})
          if duplicate_ids:
              raise SystemExit(f"owner.htmlに重複IDがあります: {duplicate_ids}")

          OWNER.write_text(owner, encoding="utf-8")
          CONFIG.write_text(config, encoding="utf-8")

          print("CAR-13-R1 顧客サマリー表示修正: OK")
          PY

      - name: Validate frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          owner = Path("owner.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script>(.*?)</script>", owner, flags=re.S)
          if not scripts:
              raise SystemExit("owner.htmlのJavaScriptが見つかりません。")
          Path("/tmp/car13-r1-owner.js").write_text(scripts[-1], encoding="utf-8")

          required = [
              "登録車両",
              "進行中査定",
              "顧客・複数車両360度",
              "顧客情報を保存",
              "車両情報を保存",
              "履歴タイムライン",
          ]
          missing = [value for value in required if value not in owner]
          if missing:
              raise SystemExit(f"必要表示が不足しています: {missing}")

          print("CAR-13-R1 HTML構成検査: OK")
          PY

          node --check /tmp/car13-r1-owner.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for filename in ("owner.html", "config.js"):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              normalized = "\n".join(line.rstrip(" \t") for line in text.splitlines()) + "\n"
              path.write_text(normalized, encoding="utf-8")
          PY

          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-13 R1 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"

          git add owner.html config.js
          git rm --ignore-unmatch .github/workflows/step-car-13-r1-customer-summary-fix.yml

          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi

          git commit -m "CAR-13-R1: clarify registered vehicles and active appraisal counts"
          git push origin main
