name: DPRO CAR STEP CAR-20 Communication Templates History

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-20-communication-templates-history.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-20
  cancel-in-progress: false

jobs:
  update-communication-templates-history:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify CAR-20 Worker and SQL
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          url="https://dpro-used-car-line-api.dpromstk2000.workers.dev/api/health"
          request=urllib.request.Request(
              url,
              headers={
                  "Accept":"application/json",
                  "User-Agent":"Mozilla/5.0 Chrome/150.0 Safari/537.36",
                  "Origin":"https://dpromstk2000-lab.github.io",
                  "Referer":"https://dpromstk2000-lab.github.io/dpro-used-car-line-liff/",
              },
          )
          try:
              with urllib.request.urlopen(request,timeout=25) as response:
                  data=json.load(response)
          except urllib.error.HTTPError as error:
              if error.code==403:
                  print("::warning::GitHub ActionsからWorker確認がHTTP 403になりました。ブラウザ確認済みとして続行します。")
                  raise SystemExit(0)
              raise
          expected="CAR-20-WORKER-LINE-COMMUNICATION-TEMPLATES-HISTORY-COMPLETE-20260723"
          if data.get("version")!=expected:
              raise SystemExit(f"WorkerがCAR-20ではありません: {data.get('version')}")
          checks=data.get("checks") or {}
          required=[
            "car20_communication_lifecycle_schema",
            "owner_communication_overview_api_ready",
            "owner_communication_draft_api_ready",
            "owner_communication_template_management_ready",
            "communication_duplicate_guard_ready",
            "communication_manual_send_guard_ready",
            "member_communication_history_ready",
            "communication_internal_recipient_guard_ready",
          ]
          failed=[key for key in required if checks.get(key) is not True]
          if failed:
              raise SystemExit(f"CAR-20 Worker/SQL確認失敗: {failed}")
          print("CAR-20 Worker/SQL: OK")
          PY

      - name: Apply CAR-20 frontend update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          OWNER=Path("owner.html")
          MEMBER=Path("member.html")
          CONFIG=Path("config.js")
          SYSTEM=Path("system-check.html")
          OLD_VERSION="CAR-19-R1-MANAGEMENT-ANALYTICS-INVENTORY-PRICE-GUARD-20260723"
          VERSION="CAR-20-COMMUNICATION-TEMPLATES-HISTORY-20260723"

          for path in (OWNER,MEMBER,CONFIG,SYSTEM):
              if not path.exists():
                  raise SystemExit(f"{path.name} が見つかりません。")

          owner=OWNER.read_text(encoding="utf-8")
          member=MEMBER.read_text(encoding="utf-8")
          config=CONFIG.read_text(encoding="utf-8")
          system=SYSTEM.read_text(encoding="utf-8")

          if OLD_VERSION not in owner or OLD_VERSION not in config:
              raise SystemExit("CAR-19-R1のフロントエンドを確認できません。")

          css=base64.b64decode("").decode("utf-8")
          owner_js=base64.b64decode("").decode("utf-8")
          member_js=base64.b64decode("").decode("utf-8")

          if "DPRO CAR STEP CAR-20 COMMUNICATION" not in owner:
              if owner.count("</style>") != 1:
                  raise SystemExit("owner.htmlのstyle終了位置を特定できません。")
              owner=owner.replace("</style>",css+"\n  </style>",1)

          view_marker='        <section class="section-view" id="view-management" hidden></section>'
          if 'id="view-communications"' not in owner:
              if owner.count(view_marker)!=1:
                  raise SystemExit("連絡管理画面の追加位置を特定できません。")
              owner=owner.replace(view_marker,view_marker+'\n        <section class="section-view" id="view-communications" hidden></section>',1)

          section_marker='      {id:"management",icon:"経",label:"経営分析",kicker:"MANAGEMENT ANALYTICS",title:"経営・在庫・粗利",description:"査定、買取、販売、在庫回転、粗利、成約率を経営数値で確認します。",count:()=>0},'
          section_new=section_marker+'\n      {id:"communications",icon:"連",label:"連絡管理",kicker:"CUSTOMER COMMUNICATION",title:"LINE連絡・送信履歴",description:"テンプレート、送信予定、文章コピー、送信済み履歴を一元管理します。",count:()=>0},'
          if 'id:"communications"' not in owner:
              if owner.count(section_marker)!=1:
                  raise SystemExit("連絡管理メニューの追加位置を特定できません。")
              owner=owner.replace(section_marker,section_new,1)

          render_marker='aftercare:renderAftercare,management:renderManagement,team:renderTeam'
          if 'communications:renderCommunications' not in owner:
              if owner.count(render_marker)!=1:
                  raise SystemExit("連絡管理レンダラーの追加位置を特定できません。")
              owner=owner.replace(render_marker,'aftercare:renderAftercare,management:renderManagement,communications:renderCommunications,team:renderTeam',1)

          if "const CAR20_STATUS_LABEL" not in owner:
              marker='    function renderTeam(){'
              if owner.count(marker)!=1:
                  raise SystemExit("CAR-20 JavaScriptの追加位置を特定できません。")
              owner=owner.replace(marker,owner_js+"\n"+marker,1)

          owner=owner.replace(OLD_VERSION,VERSION)
          owner=owner.replace(
              "<title>オーナーPC管理 CAR-19-R1｜DPRO中古車センター</title>",
              "<title>オーナーPC管理 CAR-20｜DPRO中古車センター</title>",
              1,
          )
          owner=owner.replace(
              "買取から経営分析まで、一元管理。",
              "買取からLINE連絡管理まで、一元管理。",
              1,
          )
          owner=owner.replace(
              "査定・在庫・商談・契約・納車・アフターケア・経営分析を同じ画面で確認します。",
              "査定・在庫・商談・契約・納車・アフターケア・経営分析・連絡履歴を同じ画面で確認します。",
              1,
          )

          config=config.replace(
              " * STEP CAR-19-R1 販売価格未設定車の粗利算出除外",
              " * STEP CAR-20 LINE連絡テンプレート・送信予定・対応履歴管理",
              1,
          )
          config=re.sub(r'version:\s*"[^"]+"',f'version: "{VERSION}"',config,count=1)
          config=config.replace(
              "  ownerStaffPerformance: true,",
              "  ownerStaffPerformance: true,\n  ownerCommunicationOverview: true,\n  ownerCommunicationTemplates: true,\n  ownerCommunicationSchedule: true,\n  ownerCommunicationHistory: true,\n  memberCommunicationHistory: true,\n  communicationAutoSend: false,",
              1,
          )

          jump_marker='<a href="#followups">フォロー予定</a>'
          if '<a href="#communications">ご案内履歴</a>' not in member:
              if member.count(jump_marker)!=1:
                  raise SystemExit("会員画面メニューの追加位置を特定できません。")
              member=member.replace(jump_marker,jump_marker+'<a href="#communications">ご案内履歴</a>',1)

          member_section='<section class="section" id="communications"><div class="section-head"><div><p class="section-kicker">MESSAGE HISTORY</p><h2>店舗からのご案内</h2></div><p>送信済みのご案内だけを表示</p></div><div class="follow-list" id="communicationList"></div></section>'
          followup_section='      <section class="section" id="followups"><div class="section-head"><div><p class="section-kicker">AFTER SUPPORT</p><h2>納車後フォロー</h2></div><p>点検・車検・オイル交換</p></div><div class="follow-list" id="followList"></div></section>'
          if 'id="communicationList"' not in member:
              if member.count(followup_section)!=1:
                  raise SystemExit("会員ご案内履歴の追加位置を特定できません。")
              member=member.replace(followup_section,followup_section+'\n      '+member_section,1)

          render_call='renderAftercare(data.aftercare_profiles||[],data.service_records||[]);renderFollowups(data.followups);'
          if 'renderCommunications(data.communications||[])' not in member:
              if member.count(render_call)!=1:
                  raise SystemExit("会員ご案内履歴の描画位置を特定できません。")
              member=member.replace(render_call,render_call+'renderCommunications(data.communications||[]);',1)

          if "function renderCommunications(items)" not in member:
              marker='      const memberAftercareInterest='
              if member.count(marker)!=1:
                  raise SystemExit("会員CAR-20 JavaScriptの追加位置を特定できません。")
              member=member.replace(marker,member_js+"\n"+marker,1)

          member=member.replace(
              "査定、商談、納車予定に加え、点検・車検・保証・整備履歴をLINE本人確認後に表示します。",
              "査定、商談、納車予定、点検・車検・整備履歴、店舗からのご案内をLINE本人確認後に表示します。",
              1,
          )
          if "DPRO CAR STEP CAR-20 COMMUNICATION HISTORY" not in member:
              member=member.replace("</head>","  <!-- DPRO CAR STEP CAR-20 COMMUNICATION HISTORY -->\n</head>",1)

          system=system.replace(
              "<title>システム確認 CAR-19-R1｜DPRO中古車センター</title>",
              "<title>システム確認 CAR-20｜DPRO中古車センター</title>",
              1,
          )
          system=system.replace(
              "CAR-19-R1 営業前システム確認",
              "CAR-20 営業前システム確認",
              1,
          )
          system=system.replace(
              "CAR-19-R1 販売価格未設定車の粗利算出除外",
              "CAR-20 LINE連絡テンプレート・送信予定・対応履歴管理",
              1,
          )
          label_marker='management_gross_profit_internal_guard:"粗利・原価の非公開ガード",admin_guard:'
          label_new='management_gross_profit_internal_guard:"粗利・原価の非公開ガード",car20_communication_lifecycle_schema:"CAR-20安全DB",owner_communication_overview:"連絡管理一覧API",owner_communication_draft:"連絡文章作成API",communication_template_management:"連絡テンプレート管理",communication_duplicate_guard:"同一案内二重作成防止",communication_manual_send_guard:"手動送信確認ガード",member_communication_history:"マイページご案内履歴",communication_internal_recipient_guard:"連絡先内部情報ガード",admin_guard:'
          if "car20_communication_lifecycle_schema" not in system:
              if system.count(label_marker)!=1:
                  raise SystemExit("system-checkのCAR-20ラベル追加位置を特定できません。")
              system=system.replace(label_marker,label_new,1)

          count_marker='management_targets:"経営目標",open_tasks:"未完了タスク"'
          count_new='management_targets:"経営目標",message_templates:"連絡テンプレート",communication_logs:"連絡履歴",open_tasks:"未完了タスク"'
          if 'message_templates:"連絡テンプレート"' not in system:
              if system.count(count_marker)!=1:
                  raise SystemExit("system-checkのCAR-20件数追加位置を特定できません。")
              system=system.replace(count_marker,count_new,1)

          OWNER.write_text(owner,encoding="utf-8")
          MEMBER.write_text(member,encoding="utf-8")
          CONFIG.write_text(config,encoding="utf-8")
          SYSTEM.write_text(system,encoding="utf-8")
          print("CAR-20 owner/member/config/system-check update: OK")
          PY

      - name: Validate CAR-20 frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          required={
            "owner.html":["CAR-20-COMMUNICATION-TEMPLATES-HISTORY-20260723","view-communications","renderCommunications","LINE連絡・送信履歴","文章をコピー","送信済みとして記録"],
            "member.html":["communicationList","renderCommunications(data.communications||[])","店舗からのご案内"],
            "config.js":["CAR-20-COMMUNICATION-TEMPLATES-HISTORY-20260723","ownerCommunicationOverview","memberCommunicationHistory","communicationAutoSend: false"],
            "system-check.html":["CAR-20","car20_communication_lifecycle_schema","owner_communication_overview","communication_manual_send_guard","communication_logs"],
          }
          for filename,markers in required.items():
              text=Path(filename).read_text(encoding="utf-8")
              missing=[value for value in markers if value not in text]
              if missing:
                  raise SystemExit(f"{filename}の必須項目がありません: {missing}")

          for filename in ("owner.html","member.html","system-check.html"):
              html=Path(filename).read_text(encoding="utf-8")
              scripts=[value for value in re.findall(r"<script(?:\s+[^>]*)?>(.*?)</script>",html,flags=re.S) if value.strip()]
              if not scripts:
                  raise SystemExit(f"{filename}のJavaScriptが見つかりません。")
              Path(f"/tmp/car20-{filename}.js").write_text(scripts[-1],encoding="utf-8")
              ids=re.findall(r'\bid="([^"]+)"',html)
              duplicates=sorted({value for value in ids if ids.count(value)>1})
              if duplicates:
                  raise SystemExit(f"{filename}に重複IDがあります: {duplicates}")
          print("CAR-20 frontend structure: OK")
          PY
          node --check /tmp/car20-owner.html.js
          node --check /tmp/car20-member.html.js
          node --check /tmp/car20-system-check.html.js
          node --check config.js

      - name: Normalize whitespace and show changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("owner.html","member.html","config.js","system-check.html"):
              path=Path(filename)
              text=path.read_text(encoding="utf-8")
              path.write_text("\n".join(line.rstrip(" \t") for line in text.splitlines())+"\n",encoding="utf-8")
          PY
          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-20 and remove temporary workflow
        shell: bash
        run: |
          git config user.name "DPRO CAR Automation"
          git config user.email "actions@users.noreply.github.com"
          git add owner.html member.html config.js system-check.html
          git rm --ignore-unmatch .github/workflows/step-car-20-communication-templates-history.yml
          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi
          git commit -m "CAR-20: add communication templates and history"
          git push origin main
