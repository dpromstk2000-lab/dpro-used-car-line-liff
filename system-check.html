<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#10243e">
  <meta name="description" content="DPRO中古車買取・販売LINEの営業前システムチェック。">
  <title>システム確認 CAR-16｜DPRO中古車センター</title>
  <style>
    :root{--navy:#10243e;--navy2:#173858;--ink:#122033;--muted:#5d6c7d;--amber:#e5a12b;--amber2:#fff1d2;--canvas:#f4f2ed;--paper:#fff;--soft:#eef2f5;--line:#d5dee5;--green:#117b61;--green2:#e5f5ef;--red:#b44235;--red2:#fff0ed;--shadow:0 14px 34px rgba(9,21,34,.10);--tap:52px}
    *{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;background:var(--canvas);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:17px;line-height:1.68}button,input,a{font:inherit}:focus-visible{outline:4px solid rgba(229,161,43,.42);outline-offset:2px}
    .topbar{background:#091522;color:#fff}.topbar-inner{width:min(1180px,calc(100% - 32px));min-height:70px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px}.topbar a{color:#fff;text-decoration:none;font-weight:850}.brand{font-weight:900}.brand small{display:block;color:#becbd7;font-size:12px}
    .gate-wrap{min-height:calc(100vh - 70px);padding:50px 16px;background:linear-gradient(135deg,#091522,var(--navy2));display:grid;place-items:start center}.gate{width:min(650px,100%);overflow:hidden;border-radius:22px;background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.28)}.gate-head{padding:30px;background:var(--navy);color:#fff}.gate-head h1{margin:0;font-size:32px}.gate-head p{margin:6px 0 0;color:#d9e4ed}.gate-body{padding:28px}.code-row{display:grid;grid-template-columns:1fr auto;gap:9px}.code-row input{min-height:var(--tap);padding:10px 13px;border:2px solid #c8d2da;border-radius:12px}.button{min-height:var(--tap);padding:9px 18px;border:1px solid #c4cfd8;border-radius:12px;background:#fff;color:var(--navy);font-weight:900;cursor:pointer}.button.primary{border-color:var(--amber);background:var(--amber);color:#14263a}.button.danger{color:var(--red)}.note{margin:13px 0 0;color:var(--muted);font-size:14px}.error{margin-top:14px;padding:12px;border-radius:11px;background:var(--red2);color:#8f1d14;font-weight:800}
    .page{width:min(1180px,calc(100% - 32px));margin:28px auto 70px}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}.head h1{margin:0;font-size:36px}.head p{margin:5px 0 0;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.summary{margin-top:20px;padding:22px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:20px}.summary.pass{border-color:#91cdb9;background:var(--green2)}.score strong{display:block;font-size:36px}.score span{color:var(--muted)}.checks{margin-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:11px}.check{padding:15px;border:1px solid var(--line);border-radius:14px;background:#fff;display:flex;align-items:center;gap:10px}.check.pass{border-color:#a8d7c7;background:#f2fbf7}.check.fail{border-color:#e0aaa4;background:#fff5f3}.icon{width:34px;height:34px;display:grid;place-items:center;border-radius:50%;background:var(--soft);font-weight:900}.pass .icon{background:var(--green);color:#fff}.fail .icon{background:var(--red);color:#fff}.check strong{display:block;font-size:15px}.check span{display:block;color:var(--muted);font-size:12px}.counts{margin-top:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.count{padding:15px;border-radius:14px;background:#fff;border:1px solid var(--line)}.count span{display:block;color:var(--muted);font-size:13px}.count strong{display:block;font-size:25px}.links{margin-top:18px;padding:20px;border-radius:18px;background:var(--navy);color:#fff}.links h2{margin:0 0 10px}.link-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.page-link{min-height:48px;padding:8px 12px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(255,255,255,.1);color:#fff;text-decoration:none;font-weight:850;text-align:center}.prepare-result{margin-top:12px;padding:12px;border-radius:11px;background:var(--amber2);color:#76520f}
    @media(max-width:900px){.checks{grid-template-columns:1fr 1fr}.counts{grid-template-columns:1fr 1fr}.link-grid{grid-template-columns:1fr 1fr}}@media(max-width:620px){body{font-size:17px}.topbar-inner,.page{width:min(100% - 20px,1180px)}.head,.summary{flex-direction:column;align-items:stretch}.checks,.counts,.link-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand">DPRO中古車センター<small>CAR-16 営業前システム確認</small></div><a id="ownerLink" href="owner.html">オーナー画面へ</a></div></header>
  <main class="gate-wrap" id="loginPanel"><section class="gate"><div class="gate-head"><h1>営業前システム確認</h1><p>API・DB・Storage・公開カタログ・安全ガードを一括確認します。</p></div><div class="gate-body"><form id="loginForm"><label for="adminCode"><strong>管理コード</strong></label><div class="code-row"><input id="adminCode" type="password" inputmode="numeric" autocomplete="off" maxlength="32"><button class="button primary" type="submit">確認を開始</button></div><p class="note">管理コードは端末へ保存しません。</p><div class="error" id="loginError" hidden></div></form></div></section></main>
  <main class="page" id="app" hidden>
    <header class="head"><div><h1>システム確認</h1><p>CAR-16 商談・試乗・購入検討一体管理</p></div><div class="actions"><button class="button" id="runCheck" type="button">再確認</button><button class="button" id="prepareDemo" type="button">デモ準備</button><button class="button danger" id="logout" type="button">管理コードを消去・終了</button></div></header>
    <section class="summary" id="summary"><div><h2 id="resultTitle">確認中</h2><p id="resultText"></p></div><div class="score" id="score"><strong>0/0</strong><span>確認項目</span></div></section>
    <section class="checks" id="checkGrid"></section>
    <section class="counts" id="countGrid"></section>
    <section class="links"><h2>画面確認</h2><div class="link-grid" id="pageLinks"></div><div class="prepare-result" id="prepareResult" hidden></div></section>
  </main>
  <div class="prepare-result" id="toast" hidden></div>
  <script src="config.js"></script>
  <script>
  (()=>{"use strict";
    const config=window.DPRO_CAR_CONFIG||{},params=new URLSearchParams(location.search),demo=params.get("demo")==="1",code=document.getElementById("adminCode");
    const labels={api_health:"APIヘルス",database:"Supabaseデータベース",private_photo_bucket:"非公開査定写真Storage",listing_photo_bucket:"公開在庫写真Storage",phone_normalization:"電話番号正規化",registration_normalization:"登録番号正規化",thirty_minute_slots:"30分単位の予約枠",public_inventory:"公開在庫API",public_inventory_pagination:"公開在庫ページ分割",public_inventory_facets:"公開在庫絞り込み候補",public_inventory_server_sort:"公開在庫サーバー並び替え",returning_customer_demo:"既存顧客デモ",owner_pc_api:"PC管理API",owner_ipad_api:"iPad管理API",owner_ipad_private_photo_guard:"非公開写真情報ガード",owner_inventory_content:"在庫内容編集API",owner_listing_photo_management:"公開掲載写真管理",owner_store_settings:"店舗設定API",owner_customer_360:"顧客・複数車両360度API",owner_customer_duplicate_guard:"重複顧客候補ガード",car14_lifecycle_schema:"CAR-14安全DB",owner_appraisal_lifecycle:"査定・買取・在庫ライフサイクル",appraisal_purchase_idempotency:"買取契約二重作成防止",purchase_inventory_idempotency:"在庫二重作成防止",owner_inventory_publish_readiness:"公開前確認",owner_inventory_public_preview:"管理者用公開前プレビュー",car16_sales_journey_schema:"CAR-16安全DB",owner_sales_journey:"商談・試乗・購入検討360度API",owner_sales_lead_update:"商談内容更新API",sales_lead_next_action_task:"次回対応タスク連携",sales_contract_idempotency:"販売契約二重作成防止",sales_lost_reason_guard:"失注理由必須ガード",admin_guard:"管理者認証ガード",production_guard:"本番安全ガード"};
    const countLabels={staff:"スタッフ",customers:"顧客",customer_vehicles:"顧客車両",appraisals:"査定",inventory:"在庫",sales_leads:"商談",reservations:"予約",open_tasks:"未完了タスク"};
    const byId=id=>document.getElementById(id),clear=node=>{while(node.firstChild)node.firstChild.remove()},el=(tag,cls,text)=>{const n=document.createElement(tag);if(cls)n.className=cls;if(text!==undefined)n.textContent=text;return n};
    async function api(path,options={}){const response=await fetch(`${config.apiBase}${path}`,{...options,headers:{Accept:"application/json","Content-Type":"application/json","X-Admin-Key":code.value,...options.headers},cache:"no-store"});let data={};try{data=await response.json()}catch{}if(!response.ok||!data.ok)throw new Error(data?.error?.message||data?.message||"確認に失敗しました。");return data}
    function busy(value){byId("runCheck").disabled=value;byId("prepareDemo").disabled=value}
    function render(data){const passed=data.result?.passed||0,total=data.result?.total||0,all=data.result?.all_passed===true;byId("resultTitle").textContent=all?"すべて正常です":"確認が必要な項目があります";byId("resultText").textContent=`最終確認 ${new Date(data.checked_at).toLocaleString("ja-JP")}／${data.company.company_name}`;byId("summary").classList.toggle("pass",all);byId("score").innerHTML=`<strong>${passed}/${total}</strong><span>確認項目</span>`;const grid=byId("checkGrid");clear(grid);Object.entries(data.checks||{}).forEach(([key,ok])=>{const card=el("article",`check ${ok?"pass":"fail"}`),icon=el("span","icon",ok?"✓":"!"),copy=el("div");copy.append(el("strong","",labels[key]||key),el("span","",ok?"正常":"要確認"));card.append(icon,copy);grid.append(card)});const counts=byId("countGrid");clear(counts);Object.entries(countLabels).forEach(([key,label])=>{const card=el("article","count");card.append(el("span","",label),el("strong","",`${data.counts?.[key]??0}件`));counts.append(card)})}
    function links(){const root=byId("pageLinks");clear(root);[["総合入口","index.html"],["買取査定","sell.html"],["在庫カタログ","inventory.html"],["車両詳細","vehicle.html"],["マイページ","member.html"],["オーナーPC","owner.html"],["iPad管理","owner-ipad.html"]].forEach(([label,path])=>{const a=el("a","page-link",label);a.href=`${path}${demo?"?demo=1":""}`;a.target="_blank";a.rel="noopener";root.append(a)})}
    async function run(){busy(true);try{const data=await api("/api/admin/system-check");render(data);return data}finally{busy(false)}}
    async function login(){byId("loginError").hidden=true;try{await run();byId("loginPanel").hidden=true;byId("app").hidden=false;links()}catch(error){byId("loginError").textContent=error.message;byId("loginError").hidden=false;code.focus()}}
    function logout(){code.value="";byId("app").hidden=true;byId("loginPanel").hidden=false;byId("prepareResult").hidden=true;code.focus()}
    byId("loginForm").addEventListener("submit",e=>{e.preventDefault();login()});byId("runCheck").addEventListener("click",()=>run());byId("logout").addEventListener("click",logout);byId("prepareDemo").addEventListener("click",async()=>{if(!confirm("既存デモデータを確認し、営業デモの準備状態を判定しますか？"))return;busy(true);try{const data=await api("/api/admin/demo-prepare",{method:"POST",body:"{}"});byId("prepareResult").textContent=`${data.message} データの重複追加はありません。`;byId("prepareResult").hidden=false;await run()}catch(error){alert(error.message)}finally{busy(false)}});byId("ownerLink").href=`owner.html${demo?"?demo=1":""}`;if(demo){code.value="1234";setTimeout(login,120)}else code.focus();
  })();
  </script>
</body>
</html>
